<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAZOOKA WORLD — 오픈월드 폭파 RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --v-bg: #0F1923;
    --v-panel: rgba(15, 25, 35, .82);
    --v-red: #FF4655;
    --v-white: #ECE8E1;
    --v-teal: #0AC8B9;
    --v-line: rgba(236, 232, 225, .18);
    --v-dim: rgba(236, 232, 225, .55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--v-bg); }
  /* WDS 타이포 — Pretendard 우선, 웨이트는 WDS 체계(400 regular / 500 medium / 700 bold) */
  body { font-family: "Pretendard Variable", "Pretendard", "Inter Tight", -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; user-select: none; }
  canvas#game { display: block; }

  /* ===== HUD (발로란트 스타일: 플랫 네이비 패널 + 노치 코너 + 레드/틸 액센트) ===== */
  #hud { position: fixed; inset: 0; pointer-events: none; display: none; }
  #hud.on { display: block; }

  /* 발로란트식 갭 크로스헤어: 중앙이 비어 있는 4틱 */
  #crosshair {
    position: absolute; left: 50%; top: 50%; width: 26px; height: 26px;
    transform: translate(-50%, -50%); transition: transform .08s ease;
    filter: drop-shadow(0 0 2px rgba(0,0,0,.8));
  }
  #crosshair {
    background: radial-gradient(circle at center, rgba(236,232,225,.95) 0 1px, transparent 1.6px); /* 중앙 도트 */
  }
  #crosshair::before, #crosshair::after { content: ""; position: absolute; }
  #crosshair::before {
    left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%);
    background: linear-gradient(180deg, var(--v-white) 0 30%, transparent 30% 70%, var(--v-white) 70% 100%);
  }
  #crosshair::after {
    top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%);
    background: linear-gradient(90deg, var(--v-white) 0 30%, transparent 30% 70%, var(--v-white) 70% 100%);
  }
  #crosshair.kick { transform: translate(-50%, -50%) scale(1.55); }

  .panel {
    position: relative;
    background: var(--v-panel);
    /* 저투명도 도트 그리드 — 발로란트 HUD 디테일 */
    background-image: radial-gradient(rgba(236,232,225,.045) 1px, transparent 1px);
    background-size: 9px 9px;
    backdrop-filter: blur(10px);
    border: 1px solid var(--v-line); border-radius: 0;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    color: var(--v-white); padding: 12px 16px;
  }
  /* 코너 헤어라인 틱 (좌상단 ㄱ자) */
  .panel::before {
    content: ""; position: absolute; left: 0; top: 0; width: 22px; height: 22px; pointer-events: none;
    background:
      linear-gradient(90deg, rgba(236,232,225,.5), rgba(236,232,225,.5)) 0 0 / 22px 1px no-repeat,
      linear-gradient(180deg, rgba(236,232,225,.5), rgba(236,232,225,.5)) 0 0 / 1px 22px no-repeat;
  }
  /* 우하단 미세 도트 마커 */
  .panel::after {
    content: ""; position: absolute; right: 18px; bottom: 7px; width: 26px; height: 3px; pointer-events: none; opacity: .55;
    background: radial-gradient(circle, var(--v-teal) 1.2px, transparent 1.4px) 0 0 / 8px 3px repeat-x;
  }

  #status { position: absolute; left: 20px; bottom: 20px; width: 300px; }
  /* 마이크로 라벨: WDS Caption 2 (11px/14px) + 게임 HUD 와이드 트래킹 */
  .bar-label { display: flex; justify-content: space-between; font-size: 11px; line-height: 14px; letter-spacing: .18em; font-weight: 700; text-transform: uppercase; color: var(--v-dim); margin-bottom: 5px; }
  .bar-label b { color: var(--v-white); font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: .0311em; }
  .bar { position: relative; height: 8px; border-radius: 0; background: rgba(236,232,225,.09); overflow: hidden; margin-bottom: 12px; }
  .bar > i { display: block; height: 100%; transition: width .15s ease; }
  /* 25% 간격 세그먼트 헤어라인 */
  .bar::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(90deg, transparent 0 calc(25% - 1px), rgba(15,25,35,.55) calc(25% - 1px) 25%);
  }
  #hpFill { background: var(--v-red); width: 100%; }
  #xpFill { background: var(--v-teal); width: 0%; }

  #ammoBox { position: absolute; right: 20px; bottom: 20px; text-align: right; }
  #ammoBox .rockets { display: flex; gap: 4px; justify-content: flex-end; margin-top: 8px; }
  #ammoBox .rocket-pip { width: 9px; height: 22px; border-radius: 0; background: var(--v-white); transform: skewX(-14deg); }
  #ammoBox .rocket-pip.empty { background: rgba(236,232,225,.14); }
  #ammoBox .lbl { font-size: 11px; line-height: 14px; letter-spacing: .18em; font-weight: 700; color: var(--v-dim); text-transform: uppercase; }
  /* 핵심 수치: WDS Title 3 (24px/32px, -0.023em) bold */
  #ammoBox .num { font-size: 24px; line-height: 32px; letter-spacing: -0.023em; font-weight: 700; color: var(--v-white); font-variant-numeric: tabular-nums; margin-left: 6px; }

  #questBox { position: absolute; left: 20px; top: 20px; min-width: 250px; }
  #questBox .qtitle { font-size: 11px; line-height: 14px; letter-spacing: .22em; color: var(--v-teal); font-weight: 700; margin-bottom: 7px; text-transform: uppercase; }
  #questBox .qtitle::before { content: "// "; color: rgba(10,200,185,.55); }
  /* 본문: WDS Body 2 (15px/22px, 0.0096em) medium */
  #questBox .qtext { font-size: 15px; line-height: 22px; letter-spacing: .0096em; font-weight: 500; color: var(--v-white); }
  /* 보조: WDS Label 2 (13px/18px, 0.0194em) */
  #questBox .qprog { font-size: 13px; line-height: 18px; letter-spacing: .0194em; color: var(--v-dim); margin-top: 4px; font-variant-numeric: tabular-nums; }

  #lvBadge {
    position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
    font-size: 11px; line-height: 14px; font-weight: 700; letter-spacing: .24em; color: var(--v-dim);
    padding: 9px 20px 9px 24px; text-transform: uppercase;
    border: 1px solid var(--v-line);
  }
  /* 강조 수치: WDS Headline 2 (17px, 0em) bold */
  #lvBadge b { color: var(--v-red); font-size: 17px; letter-spacing: 0; font-weight: 700; margin-left: 2px; }
  /* 좌우 다이아몬드 마커 */
  #lvBadge::before, #lvBadge::after {
    content: ""; position: absolute; top: 50%; width: 5px; height: 5px;
    background: var(--v-teal); opacity: .55; transform: translateY(-50%) rotate(45deg);
  }
  #lvBadge::before { left: -14px; }
  #lvBadge::after { right: -14px; }

  /* 다른 패널과 같은 얇은 스트로크 링으로 감쌈 */
  #minimap {
    position: absolute; right: 20px; top: 20px; border-radius: 50%;
    border: 1px solid rgba(236,232,225,.32);
    box-shadow: 0 0 0 4px rgba(15,25,35,.55);
    background: rgba(15,25,35,.65);
  }

  #feed { position: absolute; right: 20px; top: 196px; display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .feed-item {
    background: var(--v-panel);
    border: 1px solid var(--v-line); border-left: 2px solid var(--v-teal);
    color: rgba(236,232,225,.88); font-size: 13px; line-height: 18px; letter-spacing: .0194em; padding: 5px 12px; border-radius: 0;
    animation: feedIn .2s ease, feedOut .5s ease 2.5s forwards;
  }
  .feed-item b { color: var(--v-teal); }
  @keyframes feedIn { from { opacity: 0; transform: translateX(20px); } }
  @keyframes feedOut { to { opacity: 0; transform: translateX(20px); } }

  #banner {
    position: absolute; left: 50%; top: 26%; transform: translate(-50%, -50%) scale(.9);
    font-family: "Black Han Sans", "Inter Tight", sans-serif;
    font-size: 42px; font-weight: 400; letter-spacing: .06em;
    color: var(--v-white);
    filter: drop-shadow(0 2px 0 rgba(0,0,0,.4)) drop-shadow(0 0 30px rgba(10,200,185,.5));
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #banner.show { animation: bannerPop 2.2s ease forwards; }
  @keyframes bannerPop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.7); }
    12% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
    20% { transform: translate(-50%,-50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.02); }
  }

  #vignette {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(255, 30, 40, .55) 100%);
    transition: opacity .4s ease;
  }

  /* 외곽 용암지대 경고 — 주황 열기 비네트 + 중앙 경고 문구 */
  #lavaWarn {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 34%, rgba(255, 92, 20, .38) 78%, rgba(255, 40, 10, .62) 100%);
    transition: opacity .25s ease;
    display: flex; align-items: center; justify-content: center;
  }
  #lavaWarn .msg {
    margin-top: -22vh;
    padding: 12px 26px;
    background: rgba(15,25,35,.72); border: 1px solid rgba(255,120,50,.55);
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    color: #ffb38a; font-size: 15px; line-height: 22px; font-weight: 700;
    letter-spacing: .18em; text-indent: .18em;
    text-shadow: 0 0 14px rgba(255,90,20,.8);
    animation: lavaPulse 1s ease-in-out infinite;
  }
  @keyframes lavaPulse { 50% { transform: scale(1.045); filter: brightness(1.25); } }

  /* 탄약 고갈 경고 — 크로스헤어 아래 상시 표시 */
  #noAmmo {
    position: absolute; left: 50%; top: 57%; transform: translateX(-50%);
    display: none; padding: 9px 20px;
    background: rgba(15,25,35,.72); border: 1px solid rgba(255,70,85,.55);
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    color: #ff8a94; font-size: 13px; line-height: 18px; font-weight: 700;
    letter-spacing: .14em; text-indent: .14em; white-space: nowrap;
    text-shadow: 0 0 12px rgba(255,70,85,.6);
    animation: noAmmoBlink 1.1s ease-in-out infinite;
  }
  #noAmmo.on { display: block; }
  @keyframes noAmmoBlink { 50% { opacity: .45; } }

  /* ===== Overlays ===== */
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-bottom: 24vh; /* 콘텐츠 무게중심을 중앙보다 위로 */
    background: var(--v-bg); color: var(--v-white); z-index: 10; text-align: center;
  }
  #start {
    background: url('assets/ui/keyart.jpg?v=10') center / cover no-repeat var(--v-bg);
    justify-content: flex-start; padding-top: 16vh; padding-bottom: 0; /* 타이틀 상단 고정 */
  }
  .overlay > * { position: relative; z-index: 1; }
  .title-img {
    width: min(380px, 62vw); height: auto;
    filter: drop-shadow(0 12px 44px rgba(0,0,0,.75)) drop-shadow(0 0 34px rgba(10,200,185,.18));
    animation: titleIn .7s cubic-bezier(.18,1.2,.3,1) both;
  }
  @keyframes titleIn { from { opacity: 0; transform: translateY(-26px) scale(.92); } }
  /* 대형 헤딩: WDS Display 스케일 (음수 자간 -0.0282em) bold */
  .overlay h1 {
    font-size: clamp(38px, 6.4vw, 68px); font-weight: 700; letter-spacing: -0.0282em;
    color: var(--v-red);
    filter: drop-shadow(0 8px 28px rgba(255,70,85,.35));
  }
  .overlay .sub {
    margin-top: 14px; color: rgba(236,232,225,.85); font-size: 13px; line-height: 18px; font-weight: 500;
    letter-spacing: .06em; text-shadow: 0 2px 10px rgba(0,0,0,.7); white-space: nowrap;
  }
  /* 태그라인·조작키 패널 — 동일 너비로 정렬 (버튼은 텍스트 폭 기준) */
  .overlay .sub, .overlay .keys { width: min(460px, 86vw); box-sizing: border-box; }
  .overlay .keys {
    position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 34px;
    font-size: 13px; line-height: 18px; letter-spacing: .0194em; font-weight: 500; color: rgba(236,232,225,.9); text-align: left;
    background: rgba(15,25,35,.32); border: 1px solid var(--v-line);
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    padding: 20px 28px; backdrop-filter: blur(6px);
    text-shadow: 0 1px 6px rgba(0,0,0,.5);
  }
  .overlay .keys span b {
    display: inline-block; min-width: 62px;
    background: rgba(236,232,225,.07);
    border: 1px solid rgba(236,232,225,.4); border-radius: 2px;
    padding: 3px 10px; text-align: center; margin-right: 10px; font-size: 11px; line-height: 14px; font-weight: 700;
    letter-spacing: .08em; color: var(--v-white); text-shadow: none;
  }
  .overlay button {
    margin-top: 34px; pointer-events: auto; cursor: pointer;
    position: relative; overflow: hidden;
    font-family: inherit;
    font-size: 15px; line-height: 22px; font-weight: 700; letter-spacing: .3em; text-indent: .3em; color: #ffffff;
    background: var(--v-red);
    border: none; border-radius: 0;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    padding: 19px 64px;
    filter: drop-shadow(0 12px 34px rgba(255,70,85,.4));
    transition: transform .15s ease, filter .15s ease;
  }
  .overlay button:hover { transform: translateY(-2px); filter: drop-shadow(0 16px 40px rgba(255,70,85,.55)) brightness(1.08); }
  .overlay button:disabled { opacity: .55; cursor: default; transform: none; }
  .overlay button::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.35) 50%, transparent 70%);
    transform: translateX(-120%); mix-blend-mode: screen;
  }
  .overlay button:hover::after { animation: btnShine .7s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes btnShine { to { transform: translateX(120%); } }
  #death { display: none; background: radial-gradient(ellipse at 50% 40%, rgba(45,16,24,.93), rgba(8,12,18,.97)); }
  /* WDS Body 2 Reading (15px/24px) */
  #death .stats { margin-top: 16px; font-size: 15px; line-height: 24px; letter-spacing: .0096em; color: rgba(236,232,225,.85); }
  #death .stats b { color: var(--v-teal); }
</style>
</head>
<body>

<div id="hud">
  <div id="crosshair"></div>
  <div id="noAmmo">⚠ 로켓 없음 — Q 블레이드 전환</div>
  <div id="questBox" class="panel">
    <div class="qtitle">퀘스트</div>
    <div class="qtext" id="questText">—</div>
    <div class="qprog" id="questProg"></div>
  </div>
  <canvas id="minimap" width="160" height="160"></canvas>
  <div id="feed"></div>
  <div id="status" class="panel">
    <div class="bar-label"><span>체력</span><b id="hpNum">100 / 100</b></div>
    <div class="bar"><i id="hpFill"></i></div>
    <div class="bar-label"><span>경험치</span><b id="xpNum">0 / 100</b></div>
    <div class="bar" style="margin-bottom:0"><i id="xpFill"></i></div>
  </div>
  <div id="ammoBox" class="panel">
    <div class="lbl"><span id="weaponLbl">로켓</span> <span class="num" id="ammoNum">5</span></div>
    <div class="rockets" id="rocketPips"></div>
  </div>
  <div id="lvBadge" class="panel">LEVEL <b id="lvNum">1</b></div>
  <div id="banner"></div>
  <div id="vignette"></div>
<div id="lavaWarn"><div class="msg">⚠ 용암지대 — 즉시 벗어나십시오</div></div>
</div>

<div id="start" class="overlay">
  <img class="title-img" src="assets/ui/title.png?v=4" alt="BAZOOKA WORLD">
  <div class="sub">바주카포 하나로 모든 것을 폭파시키는 오픈월드 RPG</div>
  <button id="startBtn">전장에 입장</button>
  <div class="keys">
    <span><b>W A S D</b>이동</span>
    <span><b>마우스</b>시점 회전</span>
    <span><b>좌클릭</b>로켓 발사</span>
    <span><b>우클릭</b>조준 (줌)</span>
    <span><b>SHIFT</b>질주</span>
    <span><b>SPACE</b>점프</span>
    <span><b>Q</b>무기 교체</span>
    <span><b>ESC</b>일시정지</span>
  </div>
</div>

<div id="death" class="overlay">
  <h1>전사했습니다</h1>
  <div class="stats" id="deathStats"></div>
  <button id="respawnBtn">다시 시작</button>
</div>

<script>
  // 모듈(약 4MB) 로딩이 끝나기 전에는 버튼을 비활성화해 "클릭해도 무반응" 상태를 막는다
  (function () {
    var b = document.getElementById('startBtn');
    b.disabled = true;
    b.textContent = '월드 생성 중…';
  })();
</script>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "@dgreenheck/ez-tree": "https://cdn.jsdelivr.net/npm/@dgreenheck/ez-tree@1.1.0/build/ez-tree.es.js"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   기본 설정
============================================================ */
const WORLD = 380;            // 오브젝트 배치 반경
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x131a33, 190, 950); // 어두운 블루바이올렛 밤안개 — 네온 판타지 톤

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 2400);
camera.rotation.order = 'YXZ';

// AA는 컴포저 MSAA 타깃이 담당하므로 캔버스 자체 AA는 끔 (메모리·필레이트 절약)
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;   // 영화적 톤 응답
renderer.toneMappingExposure = 0.95; // 밤 장면 가시성 확보
renderer.domElement.id = 'game';
document.body.prepend(renderer.domElement);

/* ----- 파노라마 하늘 (Krea 생성 equirectangular) + 환경맵(IBL) ----- */
{
  const skyTex = new THREE.TextureLoader().load('assets/sky-pano.jpg?v=4'); // Topaz 2패스 업스케일 8192×4096
  skyTex.mapping = THREE.EquirectangularReflectionMapping;
  skyTex.colorSpace = THREE.SRGBColorSpace;
  scene.background = skyTex;
}
// 조명·그림자 방향 동기화 기준 벡터 (기존 Sky 셰이더의 태양 위치와 동일)

// 중성 스튜디오 환경맵 — 태양이 포함된 하늘맵은 수직면(풀잎 등)이 과노출되므로 사용하지 않음

/* ----- 해상도 관리 — 대형/레티나 화면 자동 다운스케일 + 동적 해상도 -----
   렌더 픽셀 수를 ~1440p 상당으로 상한: 큰 화면에서 블룸·MSAA 비용이 제곱으로 커지는 것을 방지 */
const MAX_RENDER_PIXELS = 3.4e6;
let renderScale = 1; // 동적 해상도 (0.6~1.0) — FPS 저하 시 자동 하향
function handleResize() {
  const budgetDpr = Math.sqrt(MAX_RENDER_PIXELS / Math.max(1, innerWidth * innerHeight));
  const dpr = Math.max(0.55, Math.min(devicePixelRatio, 2, budgetDpr) * renderScale);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(dpr);
  renderer.setSize(innerWidth, innerHeight);
  composer.setPixelRatio(dpr);
  composer.setSize(innerWidth, innerHeight);
}
// 블룸은 절반 해상도 체인으로 — 어차피 블러라 시각 차이 거의 없이 픽셀 비용 1/4
{
  const orig = bloomPass.setSize.bind(bloomPass);
  bloomPass.setSize = (w, h) => orig(Math.max(1, Math.round(w * 0.5)), Math.max(1, Math.round(h * 0.5)));
}
handleResize();
addEventListener('resize', handleResize);

// 동적 해상도 컨트롤러 — 1.5초 평균 FPS 기준으로 renderScale 조절
let perfAcc = 0, perfFrames = 0, perfCooldown = 0;
function updateDynamicResolution(rawDt) {
  if (rawDt > 0.25) { perfAcc = 0; perfFrames = 0; return; } // 백그라운드 탭 복귀 스파이크 무시
  perfAcc += rawDt; perfFrames++;
  if (perfCooldown > 0) perfCooldown -= rawDt;
  if (perfAcc < 1.5) return;
  const fps = perfFrames / perfAcc;
  perfAcc = 0; perfFrames = 0;
  if (perfCooldown > 0) return;
  if (fps < 45 && renderScale > 0.6) {
    renderScale = Math.max(0.6, renderScale - 0.15);
    handleResize(); perfCooldown = 3;
  } else if (fps > 57 && renderScale < 1) {
    renderScale = Math.min(1, renderScale + 0.15);
    handleResize(); perfCooldown = 3;
  }
}

function terrainH(x, z) {
  return Math.sin(x * 0.018) * Math.cos(z * 0.021) * 6
       + Math.sin(x * 0.06 + 1.7) * Math.cos(z * 0.045 - 0.6) * 1.8;
}

{
  const g = new THREE.PlaneGeometry(1100, 1100, 140, 140);
  g.rotateX(-Math.PI / 2);
  const pos = g.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  // 잔디 텍스처와 곱해지는 밝기 틴트 (저지대 어둡게, 능선 밝게)
  const cLow = new THREE.Color(0xa3ae8d), cHigh = new THREE.Color(0xffffff), tmp = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = terrainH(x, z);
    pos.setY(i, h);
    const t = THREE.MathUtils.clamp((h + 8) / 16, 0, 1) + (Math.sin(x * 1.3) * Math.cos(z * 1.7)) * 0.05;
    tmp.lerpColors(cLow, cHigh, THREE.MathUtils.clamp(t, 0, 1));
    colors.set([tmp.r, tmp.g, tmp.b], i * 3);
  }
  g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  g.computeVertexNormals();
  const groundMat = new THREE.MeshStandardMaterial({ vertexColors: true, map: TEX.grass });
  groundMat.color.setRGB(1.25, 1.25, 1.25); // 텍스처 곱연산으로 어두워진 만큼 보정
  // 안티타일링: 같은 텍스처를 다른 스케일·오프셋으로 한 번 더 샘플링해 반복 패턴 제거
  groundMat.onBeforeCompile = (shader) => {
    shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
      #ifdef USE_MAP
        vec4 g1 = texture2D(map, vMapUv);
        vec4 g2 = texture2D(map, vMapUv * 0.231 + vec2(0.37, 0.11));
        diffuseColor *= mix(g1, g2, 0.45);
      #endif
    `);
  };
  const ground = new THREE.Mesh(g, groundMat);
  ground.receiveShadow = true;
  scene.add(ground);
}

/* ----- 풀 인스턴싱 26,000클러스터 × 잎 3장 (뾰족·휘어진 블레이드 + 바람 셰이더) ----- */
const grassUniforms = { uTime: { value: 0 } };
{
  const COUNT = 26000;
  // 끝이 뾰족하고 앞으로 살짝 휘는 블레이드
  function makeBlade() {
    const g = new THREE.BufferGeometry();
    const verts = new Float32Array([
      -0.07, 0, 0,      0.07, 0, 0,
      -0.05, 0.4, 0.024, 0.05, 0.4, 0.024,
      -0.025, 0.75, 0.084, 0.025, 0.75, 0.084,
      0, 1.0, 0.15,
    ]);
    const uvs = new Float32Array([0,0, 1,0, 0,0.4, 1,0.4, 0,0.75, 1,0.75, 0.5,1]);
    g.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    g.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    g.setIndex([0,1,3, 0,3,2, 2,3,5, 2,5,4, 4,5,6]);
    g.computeVertexNormals();
    return g;
  }
  // 잎 3장을 한 클러스터로 병합 (인스턴스 수 대비 밀도 3배)
  const blades = [];
  for (let k = 0; k < 3; k++) {
    const b = makeBlade();
    b.scale(1, 0.75 + k * 0.22, 1);
    b.rotateY((k / 3) * Math.PI * 2 + k * 0.7);
    b.translate(Math.cos(k * 2.4) * 0.06, 0, Math.sin(k * 2.4) * 0.06);
    blades.push(b);
  }
  const cluster = BufferGeometryUtils.mergeGeometries(blades);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, side: THREE.DoubleSide });
  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uTime = grassUniforms.uTime;
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>', '#include <common>\nuniform float uTime;\nvarying float vGrassY;')
      .replace('#include <begin_vertex>', `#include <begin_vertex>
        vGrassY = position.y;
        float wp = instanceMatrix[3].x * 0.35 + instanceMatrix[3].z * 0.55;
        transformed.x += (sin(uTime * 1.9 + wp) * 0.5 + sin(uTime * 3.1 + wp * 1.7) * 0.25) * position.y * 0.4;
        transformed.z += sin(uTime * 1.3 + wp * 1.3) * position.y * 0.15;`);
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>', '#include <common>\nvarying float vGrassY;')
      .replace('#include <color_fragment>', `#include <color_fragment>
        diffuseColor.rgb *= mix(0.42, 1.12, clamp(vGrassY, 0.0, 1.0));`); // 밑동 어둡게 → 입체감
  };
  const grass = new THREE.InstancedMesh(cluster, mat, COUNT);
  grass.frustumCulled = false;
  grass.receiveShadow = true;
  const dummy = new THREE.Object3D();
  const col = new THREE.Color();
  for (let i = 0; i < COUNT; i++) {
    const x = (Math.random() * 2 - 1) * 430;
    const z = (Math.random() * 2 - 1) * 430;
    dummy.position.set(x, terrainH(x, z) - 0.04, z);
    dummy.rotation.set((Math.random() - 0.5) * 0.2, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.2);
    const s = 0.7 + Math.random() * 1.0;
    dummy.scale.set(s, s * (0.75 + Math.random() * 0.7), s);
    dummy.updateMatrix();
    grass.setMatrixAt(i, dummy.matrix);
    col.setHSL(0.42 + Math.random() * 0.08, 0.5 + Math.random() * 0.25, 0.09 + Math.random() * 0.09); // 어두운 틸 밤 풀 (지면 텍스처 톤 매칭)

    grass.setColorAt(i, col);
  }
  scene.add(grass);
}

function randPos(minR = 25, maxR = WORLD) {
  while (true) {
    const x = (Math.random() * 2 - 1) * maxR;
    const z = (Math.random() * 2 - 1) * maxR;
    if (Math.hypot(x, z) > minR) return new THREE.Vector3(x, terrainH(x, z), z);
  }
}

// 발자국 반경 내 최저 지형 높이 — 경사면에서 모델 가장자리가 공중에 뜨는 것 방지
function groundY(x, z, r) {
  let y = terrainH(x, z);
  for (let a = 0; a < 4; a++) {
    const th = a * Math.PI / 2 + Math.PI / 4;
    y = Math.min(y, terrainH(x + Math.cos(th) * r, z + Math.sin(th) * r));
  }
  return y;
}

/* ez-tree 프로시저럴 나무: 프리셋별 템플릿을 만들고 클론(지오메트리 공유)으로 배치
   로드 실패 시(네트워크 차단 등) 기본 로우폴리 나무로 폴백 */
const treeTemplates = [];

} catch (e) {
  console.warn('ez-tree 로드 실패 — 기본 로우폴리 나무로 대체합니다.', e);
}
if (EZTree) {
  // 사이버펑크 밤 팔레트 — 보라 단일 계열 수관(밝기 편차로 변주) + 은은한 발광(블룸)
  const presets = [
    { preset: 'Oak Medium',   leaf: 0x9a6cff, tint: 0x9a6cff, glow: 0x2c1a66, seed: 101 },
    { preset: 'Ash Medium',   leaf: 0x8a5cf5, tint: 0x8a5cf5, glow: 0x261a5e, seed: 202 },
    { preset: 'Aspen Medium', leaf: 0xb47aff, tint: 0xb47aff, glow: 0x38206e, seed: 303 },
    { preset: 'Pine Medium',  leaf: 0x6a48d8, tint: 0x6a48d8, glow: 0x1e1348, seed: 404 },
    { preset: 'Oak Small',    leaf: 0xa470ff, tint: 0xa470ff, glow: 0x301c6a, seed: 505 },
    { preset: 'Pine Small',   leaf: 0x6a48d8, tint: 0x7454e0, glow: 0x1e1348, seed: 606 },
  ];
  const box = new THREE.Box3();
  for (const cfg of presets) {
    const tree = new EZTree();
    tree.loadPreset(cfg.preset);
    tree.options.seed = cfg.seed;
    tree.options.leaves.tint = cfg.tint ?? tree.options.leaves.tint;
    tree.options.leaves.size *= 1.3;
    tree.options.leaves.alphaTest = 0.15;   // 원거리에서 잎이 사라지는 현상 완화
    if (tree.options.bark) tree.options.bark.tint = 0x39415c; // 차콜블루 수피
    tree.generate();
    tree.traverse((c) => { if (c.isMesh) c.castShadow = true; });
    // 잎은 그림자 제외 — 깊이 패스가 알파테스트를 무시해 통짜 사각형 그림자가 짙게 깔림
    if (tree.leavesMesh) tree.leavesMesh.castShadow = false;
    const lm = tree.leavesMesh?.material;
    if (lm) {
      // 잎 텍스처(초록)를 색상에서 분리 — 실루엣(알파)만 쓰고 색은 네온 틴트로
      if (lm.map) { lm.alphaMap = lm.map; lm.map = null; }
      lm.color.setHex(cfg.tint);
      if (lm.emissive) lm.emissive.setHex(cfg.glow); // 네온 수관 발광
      lm.needsUpdate = true;
    }
    box.setFromObject(tree);
    const height = Math.max(box.max.y - box.min.y, 0.001);
    treeTemplates.push({ tree, norm: 7.5 / height, leaf: cfg.leaf });
  }
}

function makeTree(p) {
  // 크리스탈 트리 GLB가 있으면 모든 나무를 크리스탈 스타일로 통일 (2종 랜덤 + 크기 편차)
  if (crystalTreeTemplate) {
    const useWillow = crystalTreeTemplate2 && Math.random() < 0.4; // 40% 위핑 윌로우형
    const tpl = useWillow ? crystalTreeTemplate2 : crystalTreeTemplate;
    const wrap = new THREE.Group();
    const m = tpl.clone(true);
    const s = 0.5 + Math.random() * 0.8; // 소형 관목 ~ 대형 랜드마크
    m.scale.multiplyScalar(s);
    m.rotation.y = Math.random() * Math.PI * 2;
    wrap.add(m);
    wrap.position.set(p.x, groundY(p.x, p.z, 1.5 * s) - 0.25 * s, p.z); // 뿌리를 매립해 접지
    scene.add(wrap);
    destructibles.push({ group: wrap, type: 'tree', hp: 35, radius: 2.2 * s, debrisColor: useWillow ? 0x5ac8ff : 0x9a6cff, blocking: 0.9 * s + 0.3, shared: true });
    return;
  }
  if (!treeTemplates.length) {
    // ez-tree 미사용 폴백: 원뿔 침엽수
    const grp = new THREE.Group();
    const h = 4 + Math.random() * 3;
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.25, 0.4, h * 0.45, 7),
      new THREE.MeshStandardMaterial({ color: 0x2c3450 })
    );
    trunk.position.y = h * 0.22;
    trunk.castShadow = true;
    grp.add(trunk);
    const leafCol = new THREE.Color().setHSL(0.72 + Math.random() * 0.06, 0.6, 0.32 + Math.random() * 0.12); // 보라 계열

    for (let i = 0; i < 3; i++) {
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(1.9 - i * 0.5, h * 0.5, 8),
        new THREE.MeshStandardMaterial({ color: leafCol })
      );
      cone.position.y = h * (0.42 + i * 0.22);
      cone.castShadow = true;
      grp.add(cone);
    }
    grp.position.copy(p);
    grp.rotation.y = Math.random() * Math.PI;
    scene.add(grp);
    destructibles.push({ group: grp, type: 'tree', hp: 30, radius: 1.6, debrisColor: leafCol.getHex(), blocking: 0.7 });
    return;
  }
  const t = treeTemplates[Math.floor(Math.random() * treeTemplates.length)];
  const grp = new THREE.Group();
  for (const child of t.tree.children) grp.add(child.clone());
  const s = t.norm * (0.75 + Math.random() * 0.55);
  grp.scale.setScalar(s);
  grp.position.copy(p);
  grp.rotation.y = Math.random() * Math.PI * 2;
  scene.add(grp);
  destructibles.push({ group: grp, type: 'tree', hp: 30, radius: 2.2 * s / t.norm, debrisColor: t.leaf, blocking: 0.8, shared: true });
}

function makeRock(p) {
  if (rockTemplate) {
    const wrap = new THREE.Group();
    const m = rockTemplate.clone(true);
    const rs = 0.5 + Math.random() * 1.1;
    m.scale.setScalar(rs);
    m.rotation.y = Math.random() * Math.PI * 2;
    wrap.add(m);
    wrap.position.set(p.x, groundY(p.x, p.z, 1.3 * rs) - 0.3 * rs, p.z); // 바위 하단 매립
    scene.add(wrap);
    destructibles.push({ group: wrap, type: 'rock', hp: 80, radius: 1.7 * rs + 0.3, debrisColor: 0x8a8a8a, blocking: 1.6 * rs, shared: true });
    return;
  }
  const s = 1 + Math.random() * 2.2;
  // 버텍스 변위로 유기적인 바위 형태 생성
  const geo = new THREE.IcosahedronGeometry(s, 1);
  const posA = geo.attributes.position;
  const v = new THREE.Vector3();
  const seed = Math.random() * 10;
  for (let i = 0; i < posA.count; i++) {
    v.fromBufferAttribute(posA, i);
    const n = 1 + 0.22 * Math.sin(v.x * 2.1 + seed) * Math.cos(v.y * 1.7 + seed * 2) + 0.1 * Math.sin(v.z * 3.3 + seed);
    posA.setXYZ(i, v.x * n, v.y * n * 0.78, v.z * n);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ map: TEX.rock, color: new THREE.Color().setHSL(0, 0, 0.9 + Math.random() * 0.3) });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(0, s * 0.35, 0);
  m.rotation.y = Math.random() * Math.PI * 2;
  m.castShadow = true;
  const wrap = new THREE.Group();
  wrap.position.copy(p);
  wrap.add(m);
  // 주변 잔돌
  for (let k = 0; k < 3; k++) {
    const ps = s * (0.15 + Math.random() * 0.2);
    const peb = new THREE.Mesh(new THREE.IcosahedronGeometry(ps, 0), mat);
    const a = Math.random() * Math.PI * 2;
    peb.position.set(Math.cos(a) * s * (0.9 + Math.random() * 0.5), ps * 0.4, Math.sin(a) * s * (0.9 + Math.random() * 0.5));
    peb.rotation.set(Math.random(), Math.random(), Math.random());
    peb.castShadow = true;
    wrap.add(peb);
  }
  scene.add(wrap);
  destructibles.push({ group: wrap, type: 'rock', hp: 80, radius: s + 0.4, debrisColor: 0x8a8a8a, blocking: s });
}

function makeHouse(p) {
  if (cabinTemplate) {
    const wrap = new THREE.Group();
    const m = cabinTemplate.clone(true);
    const hs = 0.9 + Math.random() * 0.35;
    m.scale.setScalar(hs);
    wrap.add(m);
    wrap.position.set(p.x, groundY(p.x, p.z, 3.2 * hs) - 0.2, p.z); // 기단을 살짝 매립해 접지
    wrap.rotation.y = Math.random() * Math.PI * 2;
    scene.add(wrap);
    destructibles.push({ group: wrap, type: 'house', hp: 120, radius: 4.2 * hs, debrisColor: 0xa98a64, blocking: 3.6 * hs, shared: true });
    return;
  }
  const grp = new THREE.Group();
  const w = 5 + Math.random() * 2.5, d = 5 + Math.random() * 2.5, h = 3.2;
  const roofH = d * 0.42;
  const wallTint = [0xffffff, 0xe9dcc8, 0xd8e2ea][Math.floor(Math.random() * 3)];
  const wallMat = new THREE.MeshStandardMaterial({ map: TEX.wall, color: wallTint });
  const roofMat = new THREE.MeshStandardMaterial({ map: TEX.roof, color: 0xffffff });
  const trimMat = new THREE.MeshStandardMaterial({ color: 0x8a6a45 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xf4efe4 });

  // 돌 기단
  const base = new THREE.Mesh(new THREE.BoxGeometry(w + 0.5, 0.35, d + 0.5), new THREE.MeshStandardMaterial({ map: TEX.rock, color: 0xc6cbd0 }));
  base.position.y = 0.175; base.castShadow = true; base.receiveShadow = true;
  grp.add(base);

  // 벽체
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  body.position.y = 0.35 + h / 2; body.castShadow = true; body.receiveShadow = true;
  grp.add(body);

  // 모서리 통나무 기둥
  for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, h + 0.1, 8), trimMat);
    post.position.set(sx * w / 2, 0.35 + h / 2, sz * d / 2);
    post.castShadow = true;
    grp.add(post);
  }

  // 박공 (앞뒤 삼각벽)
  const gableShape = new THREE.Shape();
  gableShape.moveTo(-w / 2, 0); gableShape.lineTo(w / 2, 0); gableShape.lineTo(0, roofH); gableShape.closePath();
  const gableGeo = new THREE.ExtrudeGeometry(gableShape, { depth: 0.14, bevelEnabled: false });
  const gableMat = new THREE.MeshStandardMaterial({ color: 0xcfa97c });
  for (const sz of [-1, 1]) {
    const gable = new THREE.Mesh(gableGeo, gableMat);
    gable.position.set(0, 0.35 + h, sz * d / 2 - (sz > 0 ? 0.14 : 0));
    gable.castShadow = true;
    grp.add(gable);
  }

  // 맞배지붕 슬랩 2장 (능선: x축)
  const slabLen = Math.hypot(d / 2, roofH) + 0.45;
  const ang = Math.atan2(roofH, d / 2);
  for (const sz of [-1, 1]) {
    const slab = new THREE.Mesh(new THREE.BoxGeometry(w + 1.0, 0.14, slabLen), roofMat);
    slab.position.set(0, 0.35 + h + roofH / 2 + 0.05, sz * d / 4);
    slab.rotation.x = sz * ang;
    slab.castShadow = true;
    grp.add(slab);
  }

  // 용마루
  const ridge = new THREE.Mesh(new THREE.BoxGeometry(w + 1.1, 0.16, 0.3), trimMat);
  ridge.position.y = 0.35 + h + roofH + 0.06;
  ridge.castShadow = true;
  grp.add(ridge);

  // 돌 굴뚝
  const chimney = new THREE.Mesh(new THREE.BoxGeometry(0.6, roofH + 1.1, 0.6), new THREE.MeshStandardMaterial({ map: TEX.rock, color: 0xd8d8d8 }));
  chimney.position.set(w * 0.28, 0.35 + h + roofH * 0.55, d * 0.18);
  chimney.castShadow = true;
  grp.add(chimney);

  // 문 + 문틀 + 손잡이
  const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.25, 0.1), trimMat);
  doorFrame.position.set(0, 0.35 + 1.12, d / 2 + 0.04);
  grp.add(doorFrame);
  const door = new THREE.Mesh(new THREE.BoxGeometry(1.1, 2, 0.12), new THREE.MeshStandardMaterial({ color: 0x5a3a22 }));
  door.position.set(0, 0.35 + 1, d / 2 + 0.06);
  grp.add(door);
  const knob = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0xd8b54a }));
  knob.position.set(0.38, 0.35 + 1, d / 2 + 0.13);
  grp.add(knob);

  // 격자 창문 (전면 1, 좌우 각 1)
  const addWindow = (x, z, ry) => {
    const wgrp = new THREE.Group();
    const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.1), frameMat);
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.0, 0.12), new THREE.MeshStandardMaterial({ color: 0x9fd8ff, emissive: 0x1c2a38 }));
    const barV = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, 0.14), frameMat);
    const barH = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.14), frameMat);
    wgrp.add(frame, glass, barV, barH);
    wgrp.position.set(x, 0.35 + 1.95, z);
    wgrp.rotation.y = ry;
    grp.add(wgrp);
  };
  addWindow(w * 0.3, d / 2 + 0.05, 0);
  addWindow(w / 2 + 0.05, 0, Math.PI / 2);
  addWindow(-w / 2 - 0.05, 0, Math.PI / 2);

  grp.position.copy(p);
  grp.rotation.y = Math.random() * Math.PI * 2;
  scene.add(grp);
  destructibles.push({ group: grp, type: 'house', hp: 120, radius: Math.max(w, d) * 0.62, debrisColor: 0xa98a64, blocking: Math.max(w, d) * 0.55 });
}

// 나무는 크리스탈 트리 GLB 로드 완료 후 스폰 (아래 async 블록) — 스타일 통일

/* ----- GLB 프롭 템플릿 (바위·오두막·배럴·크리스탈 트리) — 로드 후 배치, 실패 시 절차 모델 폴백 ----- */
let rockTemplate = null, cabinTemplate = null, barrelTemplate = null, crystalTreeTemplate = null, crystalTreeTemplate2 = null;
(async () => {
  const ld = new GLTFLoader();
  ld.setMeshoptDecoder(MeshoptDecoder);
  const normalize = (obj, target, fitAxis) => {
    const size = new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
    const base = fitAxis === 'y' ? size.y : Math.max(size.x, size.z);
    obj.scale.setScalar(target / base);
    const b2 = new THREE.Box3().setFromObject(obj);
    obj.position.x -= (b2.min.x + b2.max.x) / 2;
    obj.position.z -= (b2.min.z + b2.max.z) / 2;
    obj.position.y -= b2.min.y; // 바닥 기준
    obj.traverse((c) => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    const wrap = new THREE.Group();
    wrap.add(obj);
    return wrap;
  };
  const tryLoad = async (file, target, fitAxis) => {
    try { return normalize((await ld.loadAsync(file)).scene, target, fitAxis); }
    catch (e) { console.warn(file + ' 로드 실패 — 절차 모델 사용'); return null; }
  };
  [rockTemplate, cabinTemplate, barrelTemplate, crystalTreeTemplate, crystalTreeTemplate2] = await Promise.all([
    tryLoad('assets/models/rock.glb', 3.4, 'xz'),
    tryLoad('assets/models/cabin.glb?v=2', 7.2, 'xz'),
    tryLoad('assets/models/barrel.glb', 1.35, 'y'),
    tryLoad('assets/models/crystal-tree.glb', 9.5, 'y'),
    tryLoad('assets/models/crystal-tree2.glb', 10.5, 'y'),
  ]);
  // 수관 크리스탈이 스스로 빛나도록 베이스컬러를 발광맵으로 재사용
  for (const tpl of [crystalTreeTemplate, crystalTreeTemplate2]) {
    if (!tpl) continue;
    tpl.traverse((c) => {
      if (c.isMesh && c.material && c.material.map) {
        c.material.emissiveMap = c.material.map;
        c.material.emissive = new THREE.Color(0.55, 0.55, 0.7);
        c.material.needsUpdate = true;
      }
    });
  }
  // 나무 일괄 스폰 — 크리스탈 트리 통일 (템플릿 실패 시 ez-tree 폴백이라 개수 상향)
  const TREE_COUNT = crystalTreeTemplate ? 85 : 110;
  for (let i = 0; i < TREE_COUNT; i++) makeTree(randPos());
  for (let i = 0; i < 60; i++) makeRock(randPos());
  for (let i = 0; i < 14; i++) makeHouse(randPos(40));
  for (let i = 0; i < 32; i++) makeBarrel(randPos(18));

// 외곽 용암지대 — 지형을 따라 드리운 발광 용암 링 (블룸으로 이글거림)
{
  const lavaGeo = new THREE.RingGeometry(386, 700, 128, 4);

    const x = lp.getX(i), z = lp.getZ(i);
    lp.setY(i, terrainH(x, z) + 0.4 + Math.sin(x * 0.05) * Math.cos(z * 0.05) * 0.6);
  }
  lavaGeo.computeVertexNormals();
  const lavaMat = new THREE.MeshBasicMaterial({

/* ============================================================
   GLTF 모델: 날갯짓하는 새들 + 파괴 가능한 우유 트럭
   (로드 실패해도 게임은 그대로 동작)
============================================================ */
const mixers = [];
const birds = [];
(async () => {
  try {
    const loader = new GLTFLoader();
    loader.setMeshoptDecoder(MeshoptDecoder);

    // 하늘을 도는 새들 (Parrot / Flamingo / Stork — 날갯짓 애니메이션)
    const birdFiles = ['assets/models/parrot.glb', 'assets/models/flamingo.glb', 'assets/models/stork.glb'];
    for (let i = 0; i < 8; i++) {
      const gltf = await loader.loadAsync(birdFiles[i % 3]);
      const obj = gltf.scene;
      const size = new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
      obj.scale.setScalar((2.4 + Math.random()) / Math.max(size.x, size.y, size.z));
      scene.add(obj);
      const mixer = new THREE.AnimationMixer(obj);
      if (gltf.animations.length) mixer.clipAction(gltf.animations[0]).play();
      mixer.update(Math.random() * 2); // 날갯짓 위상 분산
      mixers.push(mixer);
      birds.push({
        obj,
        cx: (Math.random() * 2 - 1) * 250,
        cz: (Math.random() * 2 - 1) * 250,
        r: 30 + Math.random() * 60,
        h: 26 + Math.random() * 22,
        angle: Math.random() * Math.PI * 2,
        speed: (0.1 + Math.random() * 0.12) * (Math.random() < 0.5 ? 1 : -1),
        phase: Math.random() * 10,
      });
    }

    // 파괴 가능한 우유 트럭 6대 (지오메트리 공유 클론)
    const truckGltf = await loader.loadAsync('assets/models/truck.glb?v=3');
    for (let i = 0; i < 6; i++) {
      const obj = truckGltf.scene.clone(true);
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3());
      const s = 5.2 / Math.max(size.x, size.z);
      obj.scale.setScalar(s);
      obj.position.y = -box.min.y * s; // 바퀴가 지면에 닿도록
      obj.traverse((c) => { if (c.isMesh) c.castShadow = true; });
      const wrap = new THREE.Group();
      wrap.add(obj);
      const tp = randPos(35);
      // 차량은 바퀴가 지면 위에 얹혀야 하므로 발자국 내 최고 지점 기준(최저 기준이면 둔덕에 차체가 파묻힘)
      let tgy = terrainH(tp.x, tp.z);
      for (let a = 0; a < 4; a++) {
        const th = a * Math.PI / 2 + Math.PI / 4;
        tgy = Math.max(tgy, terrainH(tp.x + Math.cos(th) * 1.5, tp.z + Math.sin(th) * 1.5));
      }
      wrap.position.set(tp.x, tgy - 0.04, tp.z); // 바퀴 접지
      wrap.rotation.y = Math.random() * Math.PI * 2;
      scene.add(wrap);
      destructibles.push({ group: wrap, type: 'truck', hp: 90, radius: 3, debrisColor: 0xe8eaef, blocking: 2.4, shared: true });
    }
  } catch (e) {
    console.warn('GLTF 모델 로드 실패 — 기본 오브젝트로 계속합니다.', e);
  }
})();

// Higgsfield generate_3d 늑대 모델 (로드 전/실패 시 절차 모델 폴백)
let wolfTemplate = null;
let wolfRig = null; // 다리 셰이더용 원본 메시 공간 정보
(async () => {
  try {
    const wfLoader = new GLTFLoader();
    wfLoader.setMeshoptDecoder(MeshoptDecoder);
    const g = await wfLoader.loadAsync('assets/models/wolf.glb?v=2');
    const obj = g.scene;
    const rawBox = new THREE.Box3().setFromObject(obj);
    const size = rawBox.getSize(new THREE.Vector3());
    // 다리 셰이더 파라미터 (지오메트리 로컬 좌표 기준)
    wolfRig = {
      minY: rawBox.min.y,
      hipY: rawBox.min.y + size.y * 0.5,
      legLen: size.y * 0.5,
      cx: (rawBox.min.x + rawBox.max.x) / 2,
      cz: (rawBox.min.z + rawBox.max.z) / 2,
      halfLen: Math.max(size.x, size.z) / 2,
      amp: Math.max(size.x, size.z) * 0.09,
      longX: size.x >= size.z, // 몸길이(전후) 축
    };
    obj.scale.setScalar(2.7 / Math.max(size.x, size.z)); // 몸길이 2.7m 정규화 — 위협적인 대형 늑대
    const box2 = new THREE.Box3().setFromObject(obj);
    obj.position.x -= (box2.min.x + box2.max.x) / 2;
    obj.position.z -= (box2.min.z + box2.max.z) / 2;
    obj.position.y -= box2.min.y; // 바닥 기준
    const wrap = new THREE.Group();
    if (size.x > size.z) wrap.rotation.y = Math.PI / 2; // 최장축 → 전방(+Z)
    wrap.add(obj);
    wolfTemplate = wrap;
    window.__wolfWrap = wrap; // 방향 미세조정용
  } catch (e) { console.warn('늑대 GLB 로드 실패 — 절차 모델 유지', e); }
  // 초기 무리는 템플릿 로드 완료(또는 실패 확정) 후 스폰 — 모델 혼재 방지
  for (let i = 0; i < 40; i++) makeEnemy(randPos(50));
})();

// 리깅 없는 통짜 메시의 다리를 버텍스 셰이더로 굽히는 트롯 보행
// 힙 높이 아래 버텍스를 사분면(대각 다리 짝은 같은 위상)별로 전후 스윙
function applyWolfLegShader(mat) {
  if (!wolfRig) return;
  const r = wolfRig;
  const A = r.longX ? 'position.x' : 'position.z';   // 전후(몸길이) 축
  const B = r.longX ? 'position.z' : 'position.x';   // 좌우 축
  const AC = (r.longX ? r.cx : r.cz).toFixed(4);
  const BC = (r.longX ? r.cz : r.cx).toFixed(4);
  const OUT = r.longX ? 'transformed.x' : 'transformed.z';
  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uGallop = { value: Math.random() * 10 };
    shader.uniforms.uAmp = { value: 0 }; // 이동 속도 연동 스윙 진폭 (정지 시 0 → 다리 고정)
    mat.userData.shader = shader;
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>', '#include <common>\nuniform float uGallop;\nuniform float uAmp;')
      .replace('#include <begin_vertex>', `#include <begin_vertex>
      {
        float depth = clamp((${r.hipY.toFixed(4)} - position.y) / ${r.legLen.toFixed(4)}, 0.0, 1.0);
        float fb = ${A} - ${AC};
        // 몸통 중앙(배·가슴)은 고정하고 앞/뒤 사분면의 다리만 움직인다
        float legMask = smoothstep(0.12, 0.32, abs(fb) / ${r.halfLen.toFixed(4)});
        float w = depth * depth * legMask * uAmp;
        if (w > 0.001) {
          float sxs = fb > 0.0 ? 1.0 : -1.0;
          float szs = (${B} - ${BC}) > 0.0 ? 1.0 : -1.0;
          // 갤럽 보행: 앞다리 짝 / 뒷다리 짝이 각각 함께 움직이고 반 주기 어긋남 + 좌우 미세 위상차
          float ph = uGallop + (sxs > 0.0 ? 0.0 : 3.14159) + szs * 0.45;
          // 타원 발궤적: 지면에선 뒤로 밀고(스탠스), 공중에서만 앞으로 스윙하며 들림
          ${OUT} += sin(ph) * w * ${(r.amp * 1.25).toFixed(4)};
          transformed.y += max(0.0, cos(ph)) * depth * w * ${(r.amp * 0.7).toFixed(4)};
        }
      }`);
  };
}

function makeEnemy(p) {
  const grp = new THREE.Group();
  let body, mats, legs = null;

  if (wolfTemplate) {
    // generate_3d 늑대 — 지오메트리 공유 클론, 머티리얼은 피격 플래시용으로 개별 복제
    body = wolfTemplate.clone(true);
    mats = [];
    const isWhite = Math.random() < 0.12; // 희귀 흰 늑대 — 텍스처 밝은 틴트만
    body.traverse((c) => {
      if (c.isMesh) {
        c.material = c.material.clone();
        if (isWhite) c.material.color.setRGB(2.5, 2.5, 2.7); // 회청색 모피 → 설백색
        applyWolfLegShader(c.material);
        c.castShadow = true;
        mats.push(c.material);
      }
    });
    let ws = 0.95 + Math.random() * 0.45; // 개체 크기 편차 확대 (알파 늑대 존재)
    if (isWhite) ws *= 1.35;              // 흰 늑대는 확연히 큰 체구
    body.scale.setScalar(ws);
    grp.add(body);
    const e = finishEnemy(grp, p, body, mats, legs);
    e.ws = ws; // 갤럽 스쿼시&스트레치 기준 스케일
    e.hpGrp.position.y = 1.1 + 1.3 * ws; // 커진 몸집 위로 체력바 배치
    e.isWhite = isWhite;
    if (isWhite) {

      e.hp = e.maxHp;
      e.dmgMul = 1.8;                      // 공격력 1.8배

  // ----- 절차 모델 폴백 -----

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 10), bodyMat);
  head.position.set(0, 1.12, 0.82); head.castShadow = true;
  grp.add(head);
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.2, 0.36), bodyMat);
  snout.position.set(0, 1.02, 1.12);
  grp.add(snout);
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.06), enemyDarkMat);
  nose.position.set(0, 1.07, 1.3);
  grp.add(nose);
  // 송곳니
  for (const sx of [-0.07, 0.07]) {
    const fang = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.09, 6), enemyFangMat);
    fang.rotation.x = Math.PI;
    fang.position.set(sx, 0.9, 1.22);
    grp.add(fang);
  }
  // 귀
  for (const sx of [-0.17, 0.17]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.22, 6), bodyMat);
    ear.position.set(sx, 1.42, 0.72);
    ear.rotation.x = -0.15;
    grp.add(ear);
  }
  // 붉은 눈
  for (const sx of [-0.13, 0.13]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), enemyEyeMat);
    eye.position.set(sx, 1.17, 1.08);
    grp.add(eye);
  }
  // 다리 4개 (엉덩이 피벗으로 달리기 스윙)
  legs = [];
  for (const [sx, sz] of [[-0.26, 0.42], [0.26, 0.42], [-0.26, -0.42], [0.26, -0.42]]) {
    const legGeo = new THREE.CylinderGeometry(0.09, 0.07, 0.62, 8);

  const tail = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.5, 6), bodyMat);
  tail.position.set(0, 1.0, -0.95);
  tail.rotation.x = -2.3;

  finishEnemy(grp, p, body, mats, legs);
}

// HP바 부착 + 적 등록 (GLB/절차 모델 공용)
function finishEnemy(grp, p, body, mats, legs) {
  const hpGrp = new THREE.Group();
  const hpBg = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.16), new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.7, depthTest: false }));
  const hpFg = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.16), new THREE.MeshBasicMaterial({ color: 0xff4455, depthTest: false }));
  hpFg.position.z = 0.001;
  hpGrp.add(hpBg, hpFg);
  hpGrp.position.y = 1.6;
  hpGrp.renderOrder = 999;
  grp.add(hpGrp);

  grp.position.copy(p);
  scene.add(grp);
  const maxHp = 30 + state.level * 10;
  const e = {
    group: grp, body, mats, hpGrp, hpFg, hp: maxHp, maxHp,
    speed: 4 + Math.random() * 2.5, radius: 1.4,
    target: randPos(0, WORLD), attackT: 0, flashT: 0, bobT: Math.random() * 10, legs, ws: 1,
    // 보행/추격 상태 (모션 시스템)
    heading: Math.random() * Math.PI * 2, // 현재 바라보는 방향 (부드러운 회전)
    curSpeed: 0,                          // 가감속되는 실제 속도
    restT: Math.random() * 2,             // 배회 중 멈춰 쉬는 타이머
    lungeT: 0,                            // 도약 공격 진행 타이머 (>0이면 점프 중)
    lungeDidHit: false,
  };
  enemies.push(e);
  return e;
}

function makeHands() {
  const grp = new THREE.Group();

  // 한 손: 손바닥 + 그립을 감싸는 손가락 4개 + 엄지 + 손목 네온 커프 + 팔뚝
  // (배치 수치는 GLB 바주카 기준 프리뷰에서 실측 튜닝한 값)
  function hand(opt) {
    const h = new THREE.Group();
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.075, 0.055, 0.105), glove);
    h.add(palm);
    for (let f = 0; f < 4; f++) {
      const seg = new THREE.Mesh(new THREE.BoxGeometry(0.017, 0.05, 0.026), glove);
      seg.position.set(-0.027 + f * 0.018, 0.045, -0.028);
      seg.rotation.x = -0.55; // 그립을 감아쥐는 굽힘
      h.add(seg);
    }
    const thumb = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.045, 0.024), glove);
    thumb.position.set(opt.mirror * 0.045, 0.02, 0.028);
    thumb.rotation.z = opt.mirror * 0.7;
    h.add(thumb);
    const knuckle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.004, 0.012), neon);
    knuckle.position.set(0, -0.03, -0.02);
    h.add(knuckle);
    // 팔뚝 — 화면 아래(플레이어 몸통 방향)로 뻗는 소매
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.038, 0.052, 0.34, 8), sleeve);
    arm.position.copy(opt.armPos);
    arm.rotation.set(0.9, 0, opt.mirror * -0.35);
    arm.scale.set(0.9, 0.85, 0.9);
    h.add(arm);
    const cuffNeon = new THREE.Mesh(new THREE.TorusGeometry(0.045, 0.004, 6, 12), neon);
    cuffNeon.position.copy(opt.cuffPos);
    cuffNeon.rotation.x = 0.9 + Math.PI / 2;
    cuffNeon.scale.setScalar(opt.cuffScale);
    h.add(cuffNeon);
    h.position.copy(opt.pos);
    h.rotation.set(opt.rot.x, opt.rot.y, opt.rot.z);
    return h;
  }
  // 왼손 — 배럴 왼쪽 아래를 받침 (카메라에 보이는 손)
  grp.add(hand({
    mirror: 1,
    pos: new THREE.Vector3(-0.1, -0.07, -0.32), rot: { x: 0, y: 0, z: 1.1 },
    armPos: new THREE.Vector3(0.08, -0.12, 0.16),

  // 오른손 — 후방 그립·방아쇠 (몸체에 가려 살짝만 보임)
  grp.add(hand({

    pos: new THREE.Vector3(-0.02, -0.09, 0.24), rot: { x: 0.15, y: 0, z: 0.1 },
    armPos: new THREE.Vector3(-0.08, -0.13, 0.17),
    cuffPos: new THREE.Vector3(-0.03, -0.05, 0.06), cuffScale: 0.55,
  }));
  return grp;
}

/* ----- FPS 팔 GLB(팔꿈치~주먹) — 절차 손(handsGrp) 내용물 교체 + 블레이드 그립 팔 추가
   팔꿈치 쪽이 화면 하단 밖으로 빠져나가 실제로 쥐고 있는 1인칭 느낌 ----- */
(async () => {
  try {
    const hl = new GLTFLoader();
    hl.setMeshoptDecoder(MeshoptDecoder);
    const g = await hl.loadAsync('assets/models/arm.glb');
    const src = g.scene;
    const box = new THREE.Box3().setFromObject(src);
    const size = box.getSize(new THREE.Vector3());
    src.position.sub(box.getCenter(new THREE.Vector3()));
    src.scale.setScalar(0.72 / Math.max(size.x, size.y, size.z)); // 팔꿈치~주먹 ~72cm
    src.traverse((c) => {
      if (c.isMesh && c.material && c.material.map) {
        c.material.emissiveMap = c.material.map; // 네온 트림 자체발광
        c.material.emissive = new THREE.Color(0.22, 0.22, 0.3);
      }
    });
    const makeArm = () => {
      const h = new THREE.Group();
      h.add(src.clone(true));
      return h;
    };
    // 바주카 — 손 표시 없음 (절차 손 제거)
    handsGrp.clear();
    // 블레이드 — 왼손 주먹이 손잡이를 감싸쥐고 칼날이 주먹 위로 뻗는 발로란트식 홀드
    // (1인칭에서 손등·엄지 쪽이 보이도록 미러링된 왼팔)
    const kn = makeArm();
    kn.scale.x = -1;
    kn.position.set(0, -0.16, 0.18); kn.rotation.set(0.5, -0.2, 0);
    knifeGrp.add(kn);
    window.__knifeHand = kn;
  } catch (e) { console.warn('FPS 팔 GLB 없음 — 절차 손 유지', e); }
})();

// Meshy 생성 로켓 탄환 템플릿 (실패 시 절차 폴백)
let rocketTemplate = null;
(async () => {
  try {
    const rl = new GLTFLoader();

    obj.scale.setScalar(0.95 / Math.max(size.x, size.y, size.z)); // 전장 0.95m

    obj.traverse((c) => {

    if (size.x >= size.y && size.x >= size.z) holder.rotation.y = -Math.PI / 2;

function softCircleTexture(inner, outer) {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 2, 32, 32, 32);
  grad.addColorStop(0, inner); grad.addColorStop(1, outer);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const fireTex = softCircleTexture('rgba(255,240,180,1)', 'rgba(255,80,0,0)');
const smokeTex = softCircleTexture('rgba(120,120,120,.9)', 'rgba(80,80,80,0)');

/* 파편 생성 — opts: 색상(number) 또는 { color, map, kind: 'chunk'|'plank'|'shard'|'mixed', ember } */
function spawnDebris(pos, opts, count, power) {
  const o = typeof opts === 'number' ? { color: opts } : opts;
  const _dv = new THREE.Vector3();
  for (let i = 0; i < count; i++) {
    const kind = o.kind === 'mixed' ? ['chunk', 'plank', 'shard'][Math.floor(Math.random() * 3)] : (o.kind || 'chunk');
    let geo, rough = 0.9, metal = 0.0;
    if (kind === 'plank') {
      // 부러진 판자·각목 — 길쭉하고 한쪽이 얇게 쪼개진 비율
      geo = new THREE.BoxGeometry(0.45 + Math.random() * 0.7, 0.05 + Math.random() * 0.05, 0.1 + Math.random() * 0.12);
      // 끝단을 랜덤하게 찌그러뜨려 '부러진 단면' 표현
      const pa = geo.attributes.position;
      for (let vi = 0; vi < pa.count; vi++) {
        if (Math.abs(pa.getX(vi)) > 0.2) pa.setY(vi, pa.getY(vi) * (0.4 + Math.random() * 0.6));
      }
      geo.computeVertexNormals();
      rough = 0.85;
    } else if (kind === 'shard') {
      // 찢긴 금속 조각 — 얇고 뒤틀린 삼각 파편, 금속 광택
      geo = new THREE.BoxGeometry(0.22 + Math.random() * 0.28, 0.015 + Math.random() * 0.02, 0.16 + Math.random() * 0.2);
      const pa = geo.attributes.position;
      const twist = (Math.random() - 0.5) * 1.6;
      for (let vi = 0; vi < pa.count; vi++) {
        pa.setY(vi, pa.getY(vi) + Math.sin(pa.getX(vi) * 6) * 0.02 + pa.getX(vi) * pa.getZ(vi) * twist);
      }
      geo.computeVertexNormals();
      rough = 0.3; metal = 0.8;
    } else {
      // 불규칙한 덩어리 (돌·흙) — 버텍스 변위로 매번 다른 형태
      geo = new THREE.IcosahedronGeometry(0.11 + Math.random() * 0.22, 0);
      const pa = geo.attributes.position;
      const seed = Math.random() * 10;
      for (let vi = 0; vi < pa.count; vi++) {
        _dv.fromBufferAttribute(pa, vi);
        const n = 0.75 + 0.45 * Math.abs(Math.sin(_dv.x * 5.1 + seed) * Math.cos(_dv.y * 4.3 + seed * 2));
        pa.setXYZ(vi, _dv.x * n, _dv.y * n, _dv.z * n);
      }
      geo.computeVertexNormals();
    }
    // 색 편차 — 같은 소스여도 파편마다 밝기가 미묘하게 다름
    const baseCol = new THREE.Color(o.color ?? 0xffffff).multiplyScalar(0.75 + Math.random() * 0.45);
    const mat = new THREE.MeshStandardMaterial({
      color: baseCol, map: o.map || null,
      roughness: rough, metalness: metal, transparent: true,
    });
    let ember = false;
    if (o.ember && Math.random() < 0.45) {
      // 불씨 파편 — 발광하며 식어감 (블룸 글로우)
      ember = true;
      mat.emissive = new THREE.Color(0xff5a1a);
      mat.emissiveIntensity = 2.5;
    }
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*1.5, Math.random()*1.5, (Math.random()-0.5)*1.5));
    m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    m.castShadow = true;
    scene.add(m);
    debrisList.push({
      m, ember, kind,
      vel: new THREE.Vector3((Math.random()-0.5)*power, Math.random()*power*0.8+3, (Math.random()-0.5)*power),
      ang: new THREE.Vector3(Math.random()*10-5, Math.random()*10-5, Math.random()*10-5),
      life: 2.5 + Math.random() * 1.2,
      smokeT: Math.random() * 0.2,
      rest: 0.25 + Math.random() * 0.25, // 개체별 반발 계수
      dusted: false,
    });
  }
}

// 불규칙한 그을음 지오메트리 — 원 둘레를 저주파 노이즈로 뒤틀어 유기적인 얼룩 형태로
function makeScorchGeo() {
  const geo = new THREE.CircleGeometry(1, 28);
  const pa = geo.attributes.position;
  const p1 = Math.random() * 10, p2 = Math.random() * 10;
  for (let i = 1; i < pa.count; i++) { // 0번은 중심 버텍스 — 고정
    const x = pa.getX(i), y = pa.getY(i);
    const a = Math.atan2(y, x);
    const r = 1 + 0.28 * Math.sin(a * 3 + p1) + 0.18 * Math.sin(a * 7 + p2) + (Math.random() - 0.5) * 0.1;
    pa.setXY(i, Math.cos(a) * r, Math.sin(a) * r);
  }
  return geo;
}
function spawnScorch(pos, size) {
  const m = new THREE.Mesh(makeScorchGeo(), new THREE.MeshBasicMaterial({ color: 0x1a1410, transparent: true, opacity: 0.5, depthWrite: false }));
  m.rotation.x = -Math.PI / 2;
  m.rotation.z = Math.random() * Math.PI * 2;
  m.position.set(pos.x, terrainH(pos.x, pos.z) + 0.06, pos.z);

  scorches.push({ m, life: 6 }); // 6초에 걸쳐 사라지는 그을음 (영구 잔존 방지)
  if (scorches.length > 40) { const old = scorches.shift(); scene.remove(old.m); old.m.geometry.dispose(); old.m.material.dispose(); }
}

/* ============================================================
   사운드 (WebAudio 합성)
============================================================ */
let actx = null, noiseBuf = null;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const len = actx.sampleRate * 1.2;
  noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
}
function playNoise(dur, freq, vol, freqEnd) {
  if (!actx) return;
  const src = actx.createBufferSource(); src.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(freq, actx.currentTime);
  f.frequency.exponentialRampToValueAtTime(Math.max(40, freqEnd ?? freq * 0.1), actx.currentTime + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  src.connect(f).connect(g).connect(actx.destination);
  src.start(); src.stop(actx.currentTime + dur);
}
function playTone(f0, f1, dur, vol, type = 'sine') {
  if (!actx) return;
  const o = actx.createOscillator(); o.type = type;
  o.frequency.setValueAtTime(f0, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), actx.currentTime + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}
const sfx = {
  fire() { playNoise(0.35, 3000, 0.25, 300); playTone(220, 60, 0.3, 0.2, 'sawtooth'); },
  boom(big = 1) { playNoise(0.9 * big, 900, 0.5, 60); playTone(90, 28, 0.7 * big, 0.5, 'sine'); },
  hurt() { playTone(300, 120, 0.2, 0.25, 'square'); },
  pickup() { playTone(660, 990, 0.12, 0.18, 'sine'); playTone(990, 1320, 0.14, 0.12, 'sine'); },
  levelup() { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => playTone(f, f, 0.18, 0.2, 'triangle'), i * 90)); },
  enemyDie() { playTone(500, 80, 0.35, 0.2, 'square'); },
};

const $ = (id) => document.getElementById(id);
const hud = {
  hpFill: $('hpFill'), hpNum: $('hpNum'), xpFill: $('xpFill'), xpNum: $('xpNum'),
  ammoNum: $('ammoNum'), pips: $('rocketPips'), lv: $('lvNum'), weaponLbl: $('weaponLbl'),
  questText: $('questText'), questProg: $('questProg'),
  banner: $('banner'), feed: $('feed'), vignette: $('vignette'), lavaWarn: $('lavaWarn'),
  crosshair: $('crosshair'), noAmmo: $('noAmmo'),
  mini: $('minimap').getContext('2d'),
};
function refreshHud() {
  hud.hpFill.style.width = (state.hp / state.maxHp * 100) + '%';
  hud.hpNum.textContent = `${Math.ceil(state.hp)} / ${state.maxHp}`;
  hud.xpFill.style.width = (state.xp / xpNeed() * 100) + '%';
  hud.xpNum.textContent = `${state.xp} / ${xpNeed()}`;
  hud.ammoNum.textContent = state.weapon === 'knife' ? '—' : state.ammo;
  hud.weaponLbl.textContent = state.weapon === 'knife' ? '블레이드' : '로켓';
  hud.pips.style.opacity = state.weapon === 'knife' ? '0.3' : '1';
  hud.noAmmo.classList.toggle('on', state.started && !state.dead && state.weapon === 'bazooka' && state.ammo <= 0);
  hud.lv.textContent = state.level;
  if (hud.pips.childElementCount !== state.maxAmmo) {
    hud.pips.innerHTML = '';
    for (let i = 0; i < state.maxAmmo; i++) hud.pips.appendChild(Object.assign(document.createElement('div'), { className: 'rocket-pip' }));
  }
  [...hud.pips.children].forEach((el, i) => el.classList.toggle('empty', i >= state.ammo));
  const q = quests[questIdx];
  if (q) {
    const done = Math.min(state.counts[q.type] - questBase[q.type], q.goal);
    hud.questText.textContent = q.text;
    hud.questProg.textContent = `진행도 ${done} / ${q.goal} · 보상 ${q.reward} XP`;
  } else {
    hud.questText.textContent = '자유 파괴 모드';
    hud.questProg.textContent = `총 파괴 ${state.destroyed} · 처치 ${state.kills}`;
  }
}
function showBanner(text) {
  hud.banner.textContent = text;
  hud.banner.classList.remove('show');
  void hud.banner.offsetWidth;
  hud.banner.classList.add('show');
}
function addFeed(html) {
  const el = document.createElement('div');
  el.className = 'feed-item';
  el.innerHTML = html;
  hud.feed.prepend(el);
  setTimeout(() => el.remove(), 3100);
  while (hud.feed.childElementCount > 6) hud.feed.lastChild.remove();
}

/* ============================================================
   입력
============================================================ */
const keys = {};
let fallbackMode = false;   // 포인터 잠금이 불가능한 환경(iframe 등)용 폴백 시점 조작
let paused = false;

// 게임 입력이 유효한 상태인지 (잠금 모드 또는 폴백 모드)
function controlsActive() {
  if (!state.started || state.dead || paused) return false;
  return document.pointerLockElement === renderer.domElement || fallbackMode;
}
function showPause() {
  paused = true;
  $('start').style.display = 'flex';
  $('start').querySelector('.sub').textContent = '일시정지 — 버튼을 누르면 전장으로 돌아갑니다';
  $('startBtn').textContent = '계속하기';
}

addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'Escape' && fallbackMode && state.started && !state.dead && !paused) showPause();
  // 무기 교체 — Q 토글 / 1 바주카 / 2 블레이드
  if (state.started && !paused) {
    if (e.code === 'KeyQ') setWeapon(state.weapon === 'bazooka' ? 'knife' : 'bazooka');
    if (e.code === 'Digit1') setWeapon('bazooka');
    if (e.code === 'Digit2') setWeapon('knife');
  }
});
addEventListener('keyup', (e) => { keys[e.code] = false; });

document.addEventListener('mousemove', (e) => {
  if (!controlsActive()) return;
  const sens = state.zoom ? 0.0011 : 0.0023;
  state.yaw -= e.movementX * sens;
  state.pitch -= e.movementY * sens;
  state.pitch = THREE.MathUtils.clamp(state.pitch, -1.45, 1.45);
});
document.addEventListener('mousedown', (e) => {
  if (!controlsActive()) return;
  if (e.button === 0) state.weapon === 'knife' ? slash() : fire();
  if (e.button === 2) state.zoom = true;
});
document.addEventListener('mouseup', (e) => { if (e.button === 2) state.zoom = false; });
document.addEventListener('contextmenu', (e) => e.preventDefault());

$('startBtn').addEventListener('click', () => {
  initAudio();
  $('start').style.display = 'none';
  $('hud').classList.add('on');
  state.started = true;
  paused = false;
  try {
    const p = renderer.domElement.requestPointerLock();
    if (p && p.catch) p.catch(() => {});
  } catch (_) {}
  // 잠금이 거부되면 폴백 모드로 전환 (마우스 이동만으로 시점 조작)
  setTimeout(() => {
    if (document.pointerLockElement !== renderer.domElement && !fallbackMode && state.started) {
      fallbackMode = true;
      addFeed('포인터 잠금 미지원 환경 — <b>마우스 이동</b>으로 시점 조작, <b>ESC</b> 일시정지');
    }
  }, 350);
  refreshHud();
});
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement !== renderer.domElement && state.started && !state.dead && !fallbackMode) {
    showPause();
  } else if (document.pointerLockElement === renderer.domElement) {

});

============================================================ */
const _dir = new THREE.Vector3(), _right = new THREE.Vector3(), _up = new THREE.Vector3(0, 1, 0);

/* ----- 블레이드 근접 공격 — 동물(늑대)만 찌를 수 있음, 일반 늑대 기준 3방 ----- */
let slashAnimT = 0;
function slash() {
  if (state.dead || state.slashCd > 0) return;
  state.slashCd = 0.42;
  slashAnimT = 0.3;
  playNoise(0.12, 5600, 0.16, 1200); // 날카로운 찌르기 바람소리
  camera.getWorldDirection(_dir);
  const kdmg = Math.ceil((30 + state.level * 10) / 3); // 일반 늑대 = 정확히 3방
  let hit = false;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const to = e.group.position.clone().sub(camera.position);
    to.y *= 0.35; // 상하 판정 관대하게
    const d = to.length();
    if (d < 3.6 + e.radius * 0.4 && to.normalize().dot(_dir) > 0.5) {
      e.hp -= kdmg;
      e.flashT = 0.15;
      e.group.position.addScaledVector(to, 0.5); // 짧은 넉백
      hit = true;
      if (e.hp <= 0) killEnemy(i);
    }
  }
  // 보급 상자는 칼로 개봉 가능 (다른 구조물은 불가) — 근접 시 조준이 좀 어긋나도 열리게 관대한 판정
  for (let i = destructibles.length - 1; i >= 0; i--) {
    const o = destructibles[i];
    if (o.type !== 'crate') continue;
    const to = o.group.position.clone().sub(camera.position);
    to.y *= 0.35;
    const d = to.length();
    if (d < 4.6 + o.radius && to.normalize().dot(_dir) > 0.25) {
      hit = true;
      addFeed(`<b>보급 상자</b> 개봉!`);
      destroyObject(i, o.group.position.clone()); // 한 번 베면 개봉 → 탄창 드랍
    }
  }
  if (hit) playTone(340, 90, 0.14, 0.22, 'square'); // 타격음
  hud.crosshair.classList.add('kick');
  setTimeout(() => hud.crosshair.classList.remove('kick'), 90);
}

function fire() {
  if (state.dead || state.fireCd > 0) return;
  if (state.ammo <= 0) {
    // 탄약 고갈 — 빈 방아쇠 딸깍 + 블레이드 전환 안내
    state.fireCd = 0.4;
    playTone(180, 120, 0.06, 0.12, 'square');
    addFeed(`로켓 없음 — <b>Q</b> 키로 블레이드 전환`);
    return;
  }
  state.ammo--; state.fireCd = 0.75;
  camera.getWorldDirection(_dir);
  _right.crossVectors(_dir, _up).normalize();

  const start = camera.position.clone().add(_dir.clone().multiplyScalar(1.2)).add(_right.clone().multiplyScalar(0.35)).add(new THREE.Vector3(0, -0.25, 0));
  const grp = new THREE.Group();
  if (rocketTemplate) {
    // Meshy 생성 사이버펑크 미사일 (지오메트리 공유 클론)
    grp.add(rocketTemplate.clone(true));
  } else {
    // 절차 폴백 — 건메탈 + 네온 팁
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x2a3142, roughness: 0.4, metalness: 0.6 }));
    body.rotation.x = Math.PI / 2;
    grp.add(body);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.22, 8), new THREE.MeshStandardMaterial({ color: 0x241a3a, emissive: new THREE.Color(1.6, 0.35, 2.2), emissiveIntensity: 0.8 }));
    head.rotation.x = -Math.PI / 2; head.position.z = -0.34;
    grp.add(head);
    const finMat = new THREE.MeshStandardMaterial({ color: 0x1b2233 });
    for (let k = 0; k < 4; k++) {
      const a = k * Math.PI / 2 + Math.PI / 4;
      const fin = new THREE.Mesh(new THREE.BoxGeometry(0.016, 0.13, 0.12), finMat);
      fin.position.set(Math.cos(a) * 0.1, Math.sin(a) * 0.1, 0.2);
      fin.rotation.z = a;
      grp.add(fin);
    }
  }
  // 시안 엔진 글로우 (라이트 + 후미 플레어 스프라이트)
  const glow = new THREE.PointLight(0x66c8ff, 5, 9);
  glow.position.z = 0.3;
  grp.add(glow);
  const flare = new THREE.Sprite(new THREE.SpriteMaterial({ map: fireTex, color: 0x7ae4ff, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true }));
  flare.scale.setScalar(0.7);
  flare.position.z = 0.52;
  grp.add(flare);
  grp.position.copy(start);
  grp.lookAt(start.clone().add(_dir));
  scene.add(grp);
  rockets.push({ grp, vel: _dir.clone().multiplyScalar(85), life: 6, smokeT: 0 });

  weaponKick = 1;
  fovKick = 1;
  state.shakeT = Math.max(state.shakeT, 0.15);
  hud.crosshair.classList.add('kick');
  setTimeout(() => hud.crosshair.classList.remove('kick'), 90);
  sfx.fire();
  // 머즐 플래시 — 총구(카메라 전방 1.4m)에 0.1초간 additive 스프라이트 표시
  spawnParticle(camera.position.clone().add(_dir.clone().multiplyScalar(1.4)).add(_right.clone().multiplyScalar(0.35)).add(new THREE.Vector3(0, -0.25, 0)), _dir.clone().multiplyScalar(0.5), 1.1, 0.1, 'muzzle', 3);
  for (let i = 0; i < 6; i++)
    spawnParticle(start.clone(), _dir.clone().multiplyScalar(-3).add(new THREE.Vector3((Math.random()-.5)*2, Math.random()*2, (Math.random()-.5)*2)), 0.7, 0.5, 'smoke', 2);
  refreshHud();
}

function explode(pos, radius, dmg, scale = 1) {
  sfx.boom(scale);
  spawnRing(pos);
  spawnScorch(pos, radius * 0.55);
  const flash = new THREE.PointLight(0xffaa55, 60 * scale, radius * 6);
  flash.position.copy(pos).y += 1;
  scene.add(flash);
  particles.push({ s: flash, vel: new THREE.Vector3(), life: 0.25, maxLife: 0.25, grow: 0, kind: 'light' });

  // 코어 플래시 (한 프레임 크게 번쩍 — 블룸이 증폭)
  spawnParticle(pos.clone().add(new THREE.Vector3(0, 1.2, 0)), new THREE.Vector3(), 6.5 * scale, 0.18, 'fire', 26);
  for (let i = 0; i < 26 * scale; i++) {
    const v = new THREE.Vector3((Math.random()-.5), Math.random()*0.9, (Math.random()-.5)).normalize().multiplyScalar(6 + Math.random() * 14 * scale);
    spawnParticle(pos.clone(), v, 1.4 + Math.random() * 2.0, 0.4 + Math.random() * 0.35, 'fire', 4.5);
  }
  // 스파크 — 빠르게 튀어 포물선으로 떨어지는 불티
  for (let i = 0; i < 18 * scale; i++) {
    const v = new THREE.Vector3((Math.random()-.5), Math.random()*0.75 + 0.2, (Math.random()-.5)).normalize().multiplyScalar(20 + Math.random() * 26);
    spawnParticle(pos.clone(), v, 0.22 + Math.random() * 0.16, 0.45 + Math.random() * 0.35, 'spark', 0);
  }
  for (let i = 0; i < 18 * scale; i++) {
    const v = new THREE.Vector3((Math.random()-.5)*6, 2 + Math.random()*7, (Math.random()-.5)*6);
    spawnParticle(pos.clone(), v, 1.6 + Math.random() * 2.4, 1.2 + Math.random() * 1.2, 'smoke', 2.4);
  }

  const dCam = camera.position.distanceTo(pos);
  state.shakeT = Math.max(state.shakeT, THREE.MathUtils.clamp(0.9 - dCam / 60, 0, 0.7) * scale);
  if (dCam < 35) hitStopT = Math.max(hitStopT, 0.1 * scale); // 근거리 폭발 슬로모션

  // 플레이어 피해 + 로켓 점프
  if (dCam < radius * 1.1) {
    const fall = 1 - dCam / (radius * 1.1);
    hurtPlayer(Math.round(dmg * 0.35 * fall), `explosion dCam=${dCam.toFixed(1)}`);
    const push = state.pos.clone().sub(pos); push.y = Math.max(push.y, 0.01);
    push.normalize().multiplyScalar(18 * fall);
    state.knock.add(new THREE.Vector3(push.x, 0, push.z));
    state.velY += push.y * 0.9 + 6 * fall;
  }

  // 적 피해
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const d = e.group.position.distanceTo(pos);
    if (d < radius + e.radius) {
      const fall = 1 - Math.min(d / (radius + e.radius), 1) * 0.7;
      e.hp -= dmg * fall;
      e.flashT = 0.15;
      const kb = e.group.position.clone().sub(pos).normalize().multiplyScalar(6 * fall);
      e.group.position.add(new THREE.Vector3(kb.x * 0.3, 0, kb.z * 0.3));
      if (e.hp <= 0) killEnemy(i);
    }
  }

  // 오브젝트 피해
  for (let i = destructibles.length - 1; i >= 0; i--) {
    const o = destructibles[i];
    const d = o.group.position.distanceTo(pos);
    if (d < radius + o.radius) {
      const fall = 1 - Math.min(d / (radius + o.radius), 1) * 0.6;
      o.hp -= dmg * fall;
      if (o.hp <= 0) destroyObject(i, pos);
    }
  }
}

const typeName = { tree: '나무', rock: '바위', house: '오두막', barrel: '폭발 배럴', crate: '보급 상자', truck: '군용 트럭' };

// 탄약 픽업 드랍 — 로켓 3발이 꽂힌 탄창(클립) (GLB 로드 전에는 노란 박스 폴백)
function spawnAmmoPickup(px, pz) {
  let m;
  if (rocketTemplate) {
    m = new THREE.Group();
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x1b2233, roughness: 0.45, metalness: 0.6 });
    // 하단 받침대 + 중간 고정 스트랩
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.09, 0.3), frameMat);
    base.position.y = -0.38;
    m.add(base);
    const strap = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.06, 0.24), frameMat);
    strap.position.y = 0.05;
    m.add(strap);
    // 시안 상태 표시 스트립 (블룸)
    const led = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.014, 0.02), new THREE.MeshBasicMaterial({ color: new THREE.Color(0.3, 1.6, 1.8) }));
    led.position.set(0, 0.05, 0.13);
    m.add(led);
    // 로켓 3발 — 탄두 위로 세워 나란히
    for (let i = -1; i <= 1; i++) {
      const r = rocketTemplate.clone(true);
      r.scale.setScalar(0.85);
      r.rotation.x = Math.PI / 2; // 전방(-Z) → 상방
      r.position.set(i * 0.22, 0, 0);
      m.add(r);
    }
    m.rotation.z = 0.08; // 살짝 기울여 진열 느낌
  } else {
    m = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xffb020, emissive: 0x553300 }));
  }
  m.position.set(px, terrainH(px, pz) + 0.55, pz);
  scene.add(m);
  pickups.push({ m, kind: 'ammo' });
}
function destroyObject(idx, fromPos) {
  const o = destructibles[idx];
  destructibles.splice(idx, 1);
  const p = o.group.position.clone(); p.y += 1;
  scene.remove(o.group);
  if (!o.shared) o.group.traverse((c) => { if (c.geometry) c.geometry.dispose(); });
  if (o.type === 'tree') {
    spawnDebris(p, { color: 0x6b4a2b, kind: 'plank' }, 5, 7);                                   // 부러진 줄기
    spawnDebris(p.clone().add(new THREE.Vector3(0, 2, 0)), { color: o.debrisColor, kind: 'chunk' }, 9, 9); // 잎 뭉치
  } else if (o.type === 'house') {
    spawnDebris(p, { map: TEX.wall, kind: 'plank' }, 12, 12);                                    // 통나무 판자
    spawnDebris(p.clone().add(new THREE.Vector3(0, 2.5, 0)), { map: TEX.roof, kind: 'plank' }, 6, 10); // 기와 조각
    spawnDebris(p, { map: TEX.rock, color: 0xd8d8d8, kind: 'chunk' }, 5, 9);                     // 굴뚝·기단 돌
  } else if (o.type === 'rock') {
    spawnDebris(p, { map: TEX.rock, kind: 'chunk' }, 13, 9);                                     // 바위 파편
  } else if (o.type === 'barrel') {
    spawnDebris(p, { map: TEX.barrel, kind: 'shard', ember: true }, 10, 11);                     // 달궈진 철판
  } else if (o.type === 'crate') {
    spawnDebris(p, { map: TEX.crate, kind: 'plank' }, 9, 8);
  } else if (o.type === 'truck') {
    spawnDebris(p, { color: 0xe8eaef, kind: 'shard', ember: true }, 14, 12);                     // 불붙은 차체 조각
  } else {
    spawnDebris(p, { color: o.debrisColor, kind: 'mixed' }, 8, 8);
  }
  state.destroyed++;
  state.counts[o.type]++;
  const xpGain = { house: 25, truck: 30 }[o.type] ?? 8;
  addFeed(`<b>${typeName[o.type]}</b> 파괴 +${xpGain} XP`);
  gainXp(xpGain);

  if (o.type === 'barrel') {
    // 연쇄 폭발
    setTimeout(() => { if (!state.dead) explode(p, 7, 55, 0.9); }, 120);
  }
  if (o.type === 'truck') {
    // 연료탱크 유폭
    setTimeout(() => { if (!state.dead) explode(p, 9, 70, 1.2); }, 180);
  }
  if (o.type === 'crate') {
    // 보급 상자 → 탄창 픽업 확정 드랍 (주우면 로켓 +3)
    spawnAmmoPickup(p.x + (Math.random() - 0.5) * 1.2, p.z + (Math.random() - 0.5) * 1.2);
  }
  checkQuest();
  refreshHud();
}

function killEnemy(idx) {
  const e = enemies[idx];
  enemies.splice(idx, 1);
  const p = e.group.position.clone();
  scene.remove(e.group);
  sfx.enemyDie();
  spawnDebris(p.clone().add(new THREE.Vector3(0, 1, 0)), { color: e.mats[0]?.color ? e.mats[0].color.getHex() : 0x4a4038, kind: 'chunk' }, 10, 9);
  state.kills++; state.counts.enemy++;
  addFeed(e.isWhite ? `<b>화이트 울프</b> 처치 +60 XP` : `<b>울프</b> 처치 +20 XP`);
  gainXp(e.isWhite ? 60 : 20);
  // 경험치 구슬 — 발광 코어 + 반투명 크리스탈 셸 (흰 늑대는 3배 드랍)
  const orbN = e.isWhite ? 9 : 3;
  for (let i = 0; i < orbN; i++) {
    const m = new THREE.Group();
    const core = new THREE.Mesh(orbCoreGeo, orbCoreMat);
    const shell = new THREE.Mesh(orbShellGeo, orbShellMat);
    shell.rotation.set(0.5, 0.8, 0.3);
    m.add(core, shell);
    m.position.copy(p).add(new THREE.Vector3((Math.random()-.5)*2, 1, (Math.random()-.5)*2));
    scene.add(m);
    orbs.push({ m, core, shell, vel: new THREE.Vector3((Math.random()-.5)*4, 4, (Math.random()-.5)*4), t: 0, phase: Math.random() * 10 });
  }
  // 탄약 드랍 — 흰 늑대는 탄창 2개 확정, 일반은 35% 확률
  if (e.isWhite) {
    spawnAmmoPickup(p.x - 0.8, p.z);
    spawnAmmoPickup(p.x + 0.8, p.z + 0.5);
  } else if (Math.random() < 0.35) spawnAmmoPickup(p.x, p.z);
  checkQuest();
  refreshHud();
}

function gainXp(n) {
  state.xp += n;
  while (state.xp >= xpNeed()) {
    state.xp -= xpNeed();
    state.level++;
    state.maxHp += 20;
    state.hp = state.maxHp;
    state.damage = Math.round(state.damage * 1.12);
    state.blastRadius += 0.5;
    state.maxAmmo++;                 // 레벨마다 로켓 보유량 +1
    state.ammo = state.maxAmmo;      // 레벨업 시 탄약 재보급
    showBanner(`LEVEL ${state.level} 달성!`);
    addFeed(`<b>레벨 업!</b> 최대 체력·로켓 +1 · 탄약 보급`);
    sfx.levelup();
  }
  refreshHud();
}

function checkQuest() {
  const q = quests[questIdx];
  if (!q) return;
  if (state.counts[q.type] - questBase[q.type] >= q.goal) {
    showBanner(`퀘스트 완료! +${q.reward} XP`);
    gainXp(q.reward);
    questIdx++;
    questBase = { ...state.counts };
  }
}

const hurtLog = [];
function hurtPlayer(dmg, src = 'unknown') {
  if (state.dead || dmg <= 0) return;
  hurtLog.push({ t: clock.elapsedTime.toFixed(2), dmg, src, hpAfter: Math.round(state.hp - dmg) });
  state.hp -= dmg;
  state.hurtT = 5;
  hud.vignette.style.opacity = '1';
  setTimeout(() => { hud.vignette.style.opacity = '0'; }, 350);
  sfx.hurt();
  if (state.hp <= 0) {
    state.hp = 0; state.dead = true;
    document.exitPointerLock();
    $('deathStats').innerHTML =
      `도달 레벨 <b>${state.level}</b> · 처치 <b>${state.kills}</b> · 파괴한 오브젝트 <b>${state.destroyed}</b>`;
    $('death').style.display = 'flex';
  }
  refreshHud();
}

function drawMinimap() {
  const ctx = hud.mini, S = 160, scale = S / 320; // 320유닛 범위
  ctx.clearRect(0, 0, S, S);
  ctx.save();
  // 원형 미니맵 + 저투명도 도트 그리드
  ctx.beginPath(); ctx.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = 'rgba(15,25,35,.88)';
  ctx.fillRect(0, 0, S, S);
  ctx.fillStyle = 'rgba(236,232,225,.07)';
  for (let gy = 10; gy < S; gy += 20)
    for (let gx = 10; gx < S; gx += 20) ctx.fillRect(gx, gy, 1, 1);
  const px = state.pos.x, pz = state.pos.z;
  const dot = (x, z, color, r = 2.5) => {
    const dx = (x - px) * scale, dz = (z - pz) * scale;
    if (dx * dx + dz * dz > (S/2 - 5) * (S/2 - 5)) return;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(S/2 + dx, S/2 + dz, r, 0, Math.PI * 2); ctx.fill();
  };
  for (const o of destructibles) {
    const c = { tree: '#4f9a3f', rock: '#9aa3ad', house: '#d8c8a0', barrel: '#ff9a3c', crate: '#5ab4ff', truck: '#c0ccdc' }[o.type];
    dot(o.group.position.x, o.group.position.z, c, o.type === 'house' ? 4 : o.type === 'truck' ? 3.5 : 2);
  }
  for (const e of enemies) dot(e.group.position.x, e.group.position.z, '#ff4455', 3);
  // 플레이어 화살표
  ctx.translate(S/2, S/2);
  ctx.rotate(-state.yaw);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(5, 6); ctx.lineTo(-5, 6); ctx.closePath(); ctx.fill();
  ctx.restore();
  // 십자 그리드 라인 + 원형 테두리
  ctx.save();
  ctx.beginPath(); ctx.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2); ctx.clip();
  ctx.strokeStyle = 'rgba(236,232,225,.08)';
  ctx.beginPath(); ctx.moveTo(S/2, 0); ctx.lineTo(S/2, S); ctx.moveTo(0, S/2); ctx.lineTo(S, S/2); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle = 'rgba(236,232,225,.22)';
  ctx.beginPath(); ctx.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2); ctx.stroke();
}
