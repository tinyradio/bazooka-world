const clock = new THREE.Clock();
let enemySpawnT = 2, barrelRespawnT = 20;
let hitStopT = 0;   // 근거리 폭발 슬로모션 타이머
let fovKick = 0;    // 발사 시 FOV 킥
// (초기 늑대 스폰은 늑대 GLB 로더 완료 후 실행됨)

const _move = new THREE.Vector3(), _fwd = new THREE.Vector3(), _side = new THREE.Vector3(), _birdNext = new THREE.Vector3();
const _bbQ = new THREE.Quaternion(); // HP바 빌보드용 임시 쿼터니언

function animate() {
  requestAnimationFrame(animate);
  const rawDt = Math.min(clock.getDelta(), 0.05);
  if (hitStopT > 0) hitStopT -= rawDt;
  const dt = hitStopT > 0 ? rawDt * 0.3 : rawDt; // 슬로모션
  const t = clock.elapsedTime;
  grassUniforms.uTime.value = t;

  // resize 이벤트가 발화하지 않는 임베드 환경 대비 — 크기 불일치 감지
  if (renderer.domElement.clientWidth !== innerWidth || renderer.domElement.clientHeight !== innerHeight) handleResize();
  updateDynamicResolution(rawDt); // FPS 저하 시 렌더 해상도 자동 하향

  if (controlsActive()) {
    /* --- 이동 --- */
    const sprint = keys['ShiftLeft'] || keys['ShiftRight'];
    const speed = (sprint ? 13.5 : 8) * (state.zoom ? 0.55 : 1);
    _fwd.set(-Math.sin(state.yaw), 0, -Math.cos(state.yaw));
    _side.set(_fwd.z, 0, -_fwd.x);
    _move.set(0, 0, 0);
    if (keys['KeyW']) _move.add(_fwd);
    if (keys['KeyS']) _move.sub(_fwd);
    if (keys['KeyA']) _move.add(_side);
    if (keys['KeyD']) _move.sub(_side);
    if (_move.lengthSq() > 0) _move.normalize().multiplyScalar(speed * dt);
    state.pos.add(_move);
    state.pos.add(state.knock.clone().multiplyScalar(dt));
    state.knock.multiplyScalar(Math.max(0, 1 - dt * 4));

    // 경계
    state.pos.x = THREE.MathUtils.clamp(state.pos.x, -WORLD - 60, WORLD + 60);
    state.pos.z = THREE.MathUtils.clamp(state.pos.z, -WORLD - 60, WORLD + 60);

    // 외곽 용암지대 — 접근 시 화면 경고, 진입 시 체력 급감 (사실상 통과 불가)
    const edgeR = Math.hypot(state.pos.x, state.pos.z);
    const lavaFrac = THREE.MathUtils.clamp((edgeR - 340) / 60, 0, 1); // 340부터 경고 → 400+ 최대
    hud.lavaWarn.style.opacity = lavaFrac > 0 ? (0.25 + 0.75 * lavaFrac).toFixed(2) : '0';
    if (edgeR > 378) {
      state.lavaAcc += dt;
      if (state.lavaAcc >= 0.45) {
        state.lavaAcc = 0;
        hurtPlayer(Math.round(5 + lavaFrac * 12), 'lava');
      }
    } else state.lavaAcc = 0;

    // 오브젝트 밀어내기
    for (const o of destructibles) {
      const dx = state.pos.x - o.group.position.x, dz = state.pos.z - o.group.position.z;
      const d = Math.hypot(dx, dz), min = (o.blocking || 1) + 0.6;
      if (d < min && d > 0.001) {
        state.pos.x = o.group.position.x + dx / d * min;
        state.pos.z = o.group.position.z + dz / d * min;
      }
    }

    // 중력/점프
    const groundY = terrainH(state.pos.x, state.pos.z);
    state.velY -= 26 * dt;
    state.pos.y += state.velY * dt;
    if (state.pos.y <= groundY) {
      state.pos.y = groundY; state.velY = 0;
      if (keys['Space']) state.velY = 9.5;
    }

    // 체력 재생
    if (state.hurtT > 0) state.hurtT -= dt;
    else if (state.hp < state.maxHp) { state.hp = Math.min(state.maxHp, state.hp + 3 * dt); refreshHud(); }

    // 자동 재장전 없음 — 탄약은 픽업/레벨업으로만 보급 (0발이면 블레이드로 전환)
    if (state.fireCd > 0) state.fireCd -= dt;
    if (state.slashCd > 0) state.slashCd -= dt;
    state.simTime += dt; // 경과 시간 — 늑대 스폰 난이도 스케일링
  }

  /* --- 카메라 --- */
  const bobbing = (keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD']) && !state.dead ? Math.sin(t * 9) * 0.05 : 0;
  camera.position.set(state.pos.x, state.pos.y + 1.7 + bobbing, state.pos.z);
  camera.rotation.set(state.pitch, state.yaw, 0);
  if (state.shakeT > 0) {
    state.shakeT -= dt;
    const s = state.shakeT * 0.5;
    camera.position.x += (Math.random()-0.5) * s;
    camera.position.y += (Math.random()-0.5) * s;
    camera.position.z += (Math.random()-0.5) * s;
  }
  fovKick = Math.max(0, fovKick - rawDt * 4);
  const targetFov = (state.zoom ? 38 : 72) + fovKick * 5;
  camera.fov += (targetFov - camera.fov) * Math.min(1, rawDt * 12);
  camera.updateProjectionMatrix();

  // 무기 반동
  weaponKick = Math.max(0, weaponKick - dt * 5);
  weapon.position.z = -0.85 + weaponKick * 0.22;
  weapon.rotation.x = weaponKick * 0.35;
  weapon.position.y = -0.28 + bobbing * 0.4;

  // 블레이드 찌르기 — 짧은 당김(백스윙) 후 강한 전방 스러스트 → 복귀
  // 기본 포즈는 knifeBase에서 읽음 (프리뷰 라이브 튜닝용: window.__knifeBase)
  slashAnimT = Math.max(0, slashAnimT - dt);
  if (knifeGrp.visible) {
    const prog = slashAnimT > 0 ? 1 - slashAnimT / 0.3 : 0; // 0→1 진행도
    let th = 0; // 스러스트 계수 (음수 = 당김)
    if (prog > 0) {
      th = prog < 0.16
        ? -(prog / 0.16) * 0.35                                        // 1단계: 뒤로 당김
        : Math.sin(Math.min((prog - 0.16) / 0.62, 1) * Math.PI) * 1.0; // 2단계: 찌르기 & 복귀
    }
    const fw = Math.max(0, th);
    const B = knifeBase;
    // 주먹 지르기 — 칼을 쥔 주먹의 방향은 거의 유지한 채 크로스헤어를 향해 곧게 뻗는 펀치
    knifeGrp.rotation.set(B.rx - fw * 0.1, B.ry - fw * 0.15, B.rz + fw * 0.08);
    knifeGrp.position.set(
      B.px + fw * 0.3,                      // 주먹이 화면 중앙으로
      B.py + bobbing * 0.4 + fw * 0.16,     // 크로스헤어 높이로
      B.pz - th * 0.95                      // 깊게 뻗는 스트레이트 (당김 시엔 살짝 후퇴)
    );
  }

  // 태양 따라오기 (그림자 범위) — 하늘 셰이더의 태양 방향과 일치
  sun.position.copy(state.pos).addScaledVector(sunDir, 260);
  sun.target.position.copy(state.pos);

  /* --- 월드 시뮬레이션 (시작 전·일시정지·사망 오버레이 중에는 정지) --- */
  const simActive = state.started && !state.dead && !paused;
  if (simActive) {

  /* --- 로켓 --- */
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.life -= dt;
    r.vel.y -= 3.5 * dt;
    r.grp.position.addScaledVector(r.vel, dt);
    r.grp.lookAt(r.grp.position.clone().add(r.vel));
    r.smokeT += dt;
    if (r.smokeT > 0.025) {
      r.smokeT = 0;
      spawnParticle(r.grp.position.clone(), new THREE.Vector3((Math.random()-.5), Math.random()*0.5, (Math.random()-.5)), 0.5, 0.7, 'smoke', 2.2);
      spawnParticle(r.grp.position.clone(), new THREE.Vector3(), 0.45, 0.12, 'fire', 1);
    }
    const p = r.grp.position;
    let hit = r.life <= 0 || p.y <= terrainH(p.x, p.z) + 0.15;
    if (!hit) for (const o of destructibles) {
      if (p.distanceTo(o.group.position) < o.radius + 0.4) { hit = true; break; }
    }
    if (!hit) for (const e of enemies) {
      if (p.distanceTo(e.group.position.clone().add(new THREE.Vector3(0,0.8,0))) < e.radius + 0.4) { hit = true; break; }
    }
    if (hit) {
      rockets.splice(i, 1);
      scene.remove(r.grp);
      explode(p.clone(), state.blastRadius, state.damage, 1);
    }
  }

  /* --- 적 AI: 배회 ↔ 추격 ↔ 도약 공격 상태 기반 모션 --- */
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const ep = e.group.position;
    const distP = ep.distanceTo(state.pos);
    const chasing = distP < 35;   // simActive 내부이므로 started/dead 재확인 불필요
    e.attackT -= dt;

    // 1) 목표 지점과 희망 속도 결정
    let tx, tz, desired;
    if (e.lungeT > 0) {
      // 도약 공격 중: 개시 시점의 조준 방향으로 몸을 던진다 (방향 전환 불가)
      e.lungeT -= dt;
      tx = ep.x + Math.sin(e.heading); tz = ep.z + Math.cos(e.heading);
      desired = e.speed * 2.1;
      // 도약 후반(착지 직전)에 맞닿아 있으면 피해 판정 1회
      if (!e.lungeDidHit && e.lungeT < 0.24 && distP < 3.2) {
        e.lungeDidHit = true;
        hurtPlayer(Math.round((7 + state.level * 2) * (e.dmgMul || 1)), `wolf pounce dist=${distP.toFixed(1)}`);
      }
    } else if (chasing) {
      tx = state.pos.x; tz = state.pos.z;
      desired = distP < 2.6 ? 0 : e.speed;
      if (distP < 5.4 && e.attackT <= 0) {
        // 사거리 진입 + 쿨다운 종료 → 도약 개시
        e.attackT = 1.7;
        e.lungeT = 0.5;
        e.lungeDidHit = false;
      }
    } else {
      // 배회: 가끔 멈춰 쉬고, 느긋하게 걷는다
      const dw = Math.hypot(e.target.x - ep.x, e.target.z - ep.z);
      tx = e.target.x; tz = e.target.z;
      if (e.restT > 0) { e.restT -= dt; desired = 0; }
      else if (dw < 2.5) { e.target = randPos(0, WORLD); e.restT = 1.5 + Math.random() * 3; desired = 0; }
      else desired = 1.7;
    }

    // 2) 부드러운 회전 (즉시 스냅 금지) — 추격 시 더 민첩, 커브 진입 시 몸이 기운다
    if (e.lungeT <= 0) {
      const want = Math.atan2(tx - ep.x, tz - ep.z);
      let dh = want - e.heading;
      dh = ((dh + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
      const maxTurn = (chasing ? 3.4 : 1.8) * dt;
      e.heading += THREE.MathUtils.clamp(dh, -maxTurn, maxTurn);
      e.turnLean = THREE.MathUtils.lerp(e.turnLean || 0, THREE.MathUtils.clamp(dh, -0.9, 0.9), Math.min(1, dt * 6));
      if (Math.abs(dh) > 1.3) desired *= 0.4; // 등 돌린 채 전력질주 금지 — 먼저 몸을 돌린다
    }

    // 3) 가감속 + 전진
    e.curSpeed += (desired - e.curSpeed) * Math.min(1, dt * (desired > e.curSpeed ? 5 : 7));
    ep.x += Math.sin(e.heading) * e.curSpeed * dt;
    ep.z += Math.cos(e.heading) * e.curSpeed * dt;
    e.group.rotation.y = e.heading;

    // 4) 게이트: 보폭 템포·진폭 모두 속도 비례 (정지 시 다리 완전 고정)
    const gaitAmp = Math.min(1, e.curSpeed / 4.5);
    e.bobT += dt * (1.6 + e.curSpeed * 1.5);
    const legPh = e.bobT * 2.4;
    const lungeProg = e.lungeT > 0 ? (0.5 - e.lungeT) / 0.5 : 0;   // 0→1
    const lungeArc = e.lungeT > 0 ? Math.sin(lungeProg * Math.PI) * 1.0 : 0; // 포물선 도약 궤적

    if (e.legs) {
      // 절차 모델: 다리 스윙 + 도약 시 다리 웅크림
      ep.y = terrainH(ep.x, ep.z) + Math.abs(Math.sin(legPh)) * 0.12 * gaitAmp + lungeArc;
      for (let li = 0; li < e.legs.length; li++) {
        e.legs[li].rotation.x = Math.sin(legPh + (li % 2) * Math.PI) * 0.6 * gaitAmp + (e.lungeT > 0 ? -0.5 : 0);
      }
    } else if (e.body) {
      // GLB 늑대 갤럽: 디딤마다 출렁이는 몸통 + 커브 기울기 + 도약 피치
      ep.y = terrainH(ep.x, ep.z) + Math.abs(Math.sin(legPh)) * 0.13 * gaitAmp + lungeArc;
      const lungePitch = e.lungeT > 0 ? -0.35 * Math.sin(lungeProg * Math.PI) : 0;
      e.body.rotation.x = lungePitch + (-Math.cos(legPh) * 0.075 - 0.02) * gaitAmp;
      e.body.rotation.z = -(e.turnLean || 0) * 0.22;
      const ws = e.ws || 1;
      const sq = 1 + Math.sin(legPh) * 0.035 * gaitAmp;
      e.body.scale.set(ws, ws / sq, ws * sq);
      for (const m of e.mats) {
        const sh = m.userData.shader;
        if (sh) { sh.uniforms.uGallop.value = legPh; sh.uniforms.uAmp.value = Math.max(gaitAmp, e.lungeT > 0 ? 0.7 : 0); }
      }
    }
    // 피격 플래시
    const flashHex = e.flashT > 0 ? 0xffffff : 0x000000;
    if (e.flashT > 0) e.flashT -= dt;
    for (const m of e.mats) if (m.emissive) m.emissive.setHex(flashHex);
    // HP바 — 부모(늑대)의 회전을 상쇄한 뒤 카메라를 향하게 (월드 기준 빌보드)
    e.hpFg.scale.x = Math.max(0.001, e.hp / e.maxHp);
    e.hpFg.position.x = -(1 - e.hpFg.scale.x) * 0.7;
    _bbQ.copy(e.group.quaternion).invert().multiply(camera.quaternion);
    e.hpGrp.quaternion.copy(_bbQ);
  }

  // 적 리스폰 — 시간이 지날수록 상한 증가(30초마다 +4, 최대 96)·스폰 간격 단축 → 난이도 상승
  enemySpawnT -= dt;
  const wolfCap = Math.min(96, 40 + Math.floor(state.simTime / 30) * 4 + state.level * 3);
  if (state.started && enemySpawnT <= 0 && enemies.length < wolfCap) {
    enemySpawnT = Math.max(0.4, 1 - state.simTime / 300);
    makeEnemy(randPos(60));
  }
  // 배럴/상자 리스폰
  barrelRespawnT -= dt;
  if (barrelRespawnT <= 0) {
    barrelRespawnT = 18;
    if (destructibles.filter(o => o.type === 'barrel').length < 24) makeBarrel(randPos(40));
    if (destructibles.filter(o => o.type === 'crate').length < 22) makeCrate(randPos(40));
  }

  /* --- 파티클 --- */
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.s);
      if (p.s.material && p.kind !== 'light') p.s.material.dispose();
      particles.splice(i, 1);
      continue;
    }
    const k = p.life / p.maxLife;
    if (p.kind === 'light') { p.s.intensity = 60 * k; continue; }
    p.s.position.addScaledVector(p.vel, dt);
    p.vel.multiplyScalar(1 - dt * 1.6);
    if (p.kind === 'smoke') p.vel.y += 2.2 * dt;
    if (p.kind === 'spark') p.vel.y -= 48 * dt; // 불티는 포물선 낙하
    if (p.kind === 'ring') {
      p.s.scale.setScalar(1 + (1 - k) * p.grow);
      p.s.material.opacity = k * 0.9;
    } else {
      p.s.scale.addScalar(p.grow * dt);
      p.s.material.opacity = (p.kind === 'fire' || p.kind === 'spark') ? k : k * 0.55;
    }
  }

  /* --- 파편 --- */
  for (let i = debrisList.length - 1; i >= 0; i--) {
    const d = debrisList[i];
    d.life -= dt;
    if (d.life <= 0) {
      scene.remove(d.m); d.m.material.dispose(); d.m.geometry.dispose();
      debrisList.splice(i, 1);
      continue;
    }
    d.vel.y -= 20 * dt;
    d.m.position.addScaledVector(d.vel, dt);
    d.m.rotation.x += d.ang.x * dt; d.m.rotation.y += d.ang.y * dt; d.m.rotation.z += d.ang.z * dt;
    const gy = terrainH(d.m.position.x, d.m.position.z) + 0.15;
    if (d.m.position.y < gy) {
      d.m.position.y = gy;
      // 첫 강착지에 먼지 puff — 무게감 표현
      if (!d.dusted && d.vel.y < -5) {
        d.dusted = true;
        spawnParticle(d.m.position.clone(), new THREE.Vector3((Math.random()-.5)*0.8, 0.9, (Math.random()-.5)*0.8), 0.45, 0.5, 'smoke', 2.2);
      }
      d.vel.y *= -(d.rest ?? 0.35);
      d.vel.x *= 0.6; d.vel.z *= 0.6;
      d.ang.multiplyScalar(0.45);
    }
    // 불씨 파편: 식어가며 연기를 흘림
    if (d.ember) {
      d.m.material.emissiveIntensity = Math.max(0, d.m.material.emissiveIntensity - dt * 1.4);
      d.smokeT -= dt;
      if (d.smokeT <= 0 && d.m.material.emissiveIntensity > 0.4) {
        d.smokeT = 0.14 + Math.random() * 0.1;
        spawnParticle(d.m.position.clone(), new THREE.Vector3((Math.random()-.5), 1.5 + Math.random(), (Math.random()-.5)), 0.35, 0.6, 'smoke', 1.6);
      }
    }
    if (d.life < 0.6) {
      // 소멸: 페이드 + 땅으로 잦아드는 수축
      d.m.material.opacity = d.life / 0.6;
      const sk = 0.55 + 0.75 * (d.life / 0.6);
      d.m.scale.setScalar(sk);
    }
    d.m.material.transparent = true;
  }

  /* --- 경험치 구슬 --- */
  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    o.t += dt;
    const toP = state.pos.clone().add(new THREE.Vector3(0, 1, 0)).sub(o.m.position);
    const dist = toP.length();
    if (dist < 8 && o.t > 0.4) {
      o.m.position.addScaledVector(toP.normalize(), (16 - dist) * 1.6 * dt);
    } else {
      o.vel.y -= 14 * dt;
      o.m.position.addScaledVector(o.vel, dt);
      const gy = terrainH(o.m.position.x, o.m.position.z) + 0.3;
      if (o.m.position.y < gy) { o.m.position.y = gy; o.vel.set(0, 0, 0); o.groundY = gy; }
      // 착지 후 공중 부양 — 살짝 떠서 위아래로 숨쉬듯
      if (o.vel.lengthSq() === 0 && o.groundY) o.m.position.y = o.groundY + 0.12 + Math.sin(t * 2.6 + o.phase) * 0.09;
    }
    o.m.rotation.y += dt * 4;
    if (o.shell) {
      o.shell.rotation.y -= dt * 2.4;         // 셸은 역방향 회전
      o.shell.rotation.x += dt * 0.8;
      const pulse = 1 + Math.sin(t * 5 + o.phase) * 0.15;
      o.core.scale.setScalar(pulse);          // 코어 맥동
    }
    if (dist < 1.4) {
      scene.remove(o.m);
      orbs.splice(i, 1);
      gainXp(10);
      sfx.pickup();
      addFeed(`경험치 구슬 <b>+10 XP</b>`);
    }
  }

  /* --- 탄약 픽업 --- */
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    pk.m.rotation.y += dt * 2;
    pk.m.position.y = terrainH(pk.m.position.x, pk.m.position.z) + 0.5 + Math.sin(t * 3) * 0.1;
    if (pk.m.position.distanceTo(state.pos) < 1.8) {
      scene.remove(pk.m);
      pickups.splice(i, 1);
      state.ammo = Math.min(state.maxAmmo, state.ammo + 3);
      sfx.pickup();
      addFeed(`로켓 <b>+3</b> 획득`);
      refreshHud();
    }
  }

  /* --- 그을음 데칼 페이드아웃 --- */
  for (let i = scorches.length - 1; i >= 0; i--) {
    const sc = scorches[i];
    sc.life -= dt;
    if (sc.life <= 0) {
      scene.remove(sc.m); sc.m.geometry.dispose(); sc.m.material.dispose();
      scorches.splice(i, 1);
    } else {
      sc.m.material.opacity = Math.min(0.5, sc.life / 6 * 0.5 + 0.05);
    }
  }

  } // simActive 끝 — 이하 배경 연출(새·나무 바람)은 항상 재생

  /* --- GLTF: 새 비행 + 날갯짓 애니메이션 --- */
  for (const mx of mixers) mx.update(dt);
  for (const b of birds) {
    b.angle += b.speed * dt;
    const ny = b.h + Math.sin(t * 1.5 + b.phase) * 2;
    b.obj.position.set(b.cx + Math.cos(b.angle) * b.r, ny, b.cz + Math.sin(b.angle) * b.r);
    const la = b.angle + (b.speed > 0 ? 0.08 : -0.08);
    _birdNext.set(b.cx + Math.cos(la) * b.r, ny, b.cz + Math.sin(la) * b.r);
    b.obj.lookAt(_birdNext);
  }

  /* --- 나무 바람 애니메이션 (공유 머티리얼 uTime 갱신 → 모든 클론에 적용) --- */
  for (const tt of treeTemplates) {
    try { tt.tree.update(t); } catch (_) {}
  }

  if (state.started) drawMinimap();
  composer.render();
}
animate();
refreshHud();
